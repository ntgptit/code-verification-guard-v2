version: 1
metadata:
  id: memox-v4-ruleset-scopes
  name: MemoX V4 Ruleset Scopes
  description: Scopes loaded by the MemoX V4 ruleset manifest. Paths match the
    memox-V4 repo layout (hyphenated feature dirs, providers/ not viewmodels/,
    routing under lib/core/routes, shared split into primitives/composites/layouts/screens).
scopes:
  project_files:
    include:
      - pubspec.yaml
      - analysis_options.yaml
      - lib/**/*.dart
      - test/**/*.dart
      - integration_test/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/l10n/app_localizations*.dart
      - web/**
      - tools/**
      - code-verification-guard/**
      - code-verification-guard-v2/**
  all_text_files:
    include:
      - pubspec.yaml
      - analysis_options.yaml
      - lib/**/*.dart
      - test/**/*.dart
      - integration_test/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/l10n/app_localizations*.dart
      - web/**
      - tools/**
      - code-verification-guard/**
      - code-verification-guard-v2/**
  text_source_files:
    include:
      - pubspec.yaml
      - analysis_options.yaml
      - lib/**/*.dart
      - test/**/*.dart
      - integration_test/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/l10n/app_localizations*.dart
      - web/**
      - tools/**
      - code-verification-guard/**
      - code-verification-guard-v2/**
  source_files:
    include:
      - lib/**/*.dart
      - test/**/*.dart
      - integration_test/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/l10n/app_localizations*.dart
      - web/**
      - tools/**
      - code-verification-guard/**
      - code-verification-guard-v2/**
  source_and_config_files:
    include:
      - pubspec.yaml
      - analysis_options.yaml
      - lib/**/*.dart
      - test/**/*.dart
      - integration_test/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/l10n/app_localizations*.dart
      - web/**
      - tools/**
      - code-verification-guard/**
      - code-verification-guard-v2/**
  dart_source:
    include:
      - lib/**/*.dart
      - test/**/*.dart
      - integration_test/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/l10n/app_localizations*.dart
  dart_lib:
    include:
      - lib/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/l10n/app_localizations*.dart
      - '**/.dart_tool/**'
      - '**/build/**'
  flutter_source:
    include:
      - lib/**/*.dart
      - test/**/*.dart
      - integration_test/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/l10n/app_localizations*.dart
  flutter_app_source:
    include:
      - lib/**/*.dart
    exclude:
      - lib/core/theme/**
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/l10n/app_localizations*.dart
      - lib/presentation/shared/screens/**
      - '**/.dart_tool/**'
      - '**/build/**'
  all:
    include:
      - lib/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  app_bar_header_files:
    include:
      - lib/presentation/features/**/*_header.dart
      - lib/presentation/features/study-session/screens/study_session_screen.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  app_source_except_logger:
    include:
      - lib/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
      - lib/core/logging/app_logger.dart
      - '**/core/logging/app_logger.dart'
  app_and_presentation_source:
    include:
      - lib/app/**/*.dart
      - lib/presentation/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
      - lib/l10n/app_localizations*.dart
  app_ui:
    include:
      - lib/main.dart
      - lib/app/app.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  child_widget_layout_files:
    include:
      - lib/presentation/shared/primitives/*.dart
      - lib/presentation/shared/primitives/**/*.dart
      - lib/presentation/shared/composites/*.dart
      - lib/presentation/shared/composites/**/*.dart
      - lib/presentation/shared/layouts/*.dart
      - lib/presentation/shared/layouts/**/*.dart
      - lib/presentation/features/**/widgets/*.dart
      - lib/presentation/features/**/widgets/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
      - lib/presentation/features/**/widgets/**/*_dialog.dart
      - lib/presentation/features/**/widgets/**/*_sheet.dart
      - lib/presentation/features/**/widgets/**/*_overlay.dart
      - lib/presentation/features/**/widgets/**/*_fullscreen_modal.dart
      - lib/presentation/features/**/widgets/**/*_image_preview.dart
  child_widget_screen_width_files:
    include:
      - lib/presentation/shared/primitives/*.dart
      - lib/presentation/shared/primitives/**/*.dart
      - lib/presentation/shared/composites/*.dart
      - lib/presentation/shared/composites/**/*.dart
      - lib/presentation/shared/layouts/*.dart
      - lib/presentation/shared/layouts/**/*.dart
      - lib/presentation/features/**/widgets/*.dart
      - lib/presentation/features/**/widgets/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
      - lib/presentation/features/**/widgets/**/*_dialog.dart
      - lib/presentation/features/**/widgets/**/*_overlay.dart
      - lib/presentation/features/**/widgets/**/*_fullscreen_modal.dart
  core_di:
    # v4: no lib/app/di folder — DI is colocated @riverpod. Rules using this scope
    # are disabled in memox-v4. Kept empty so the scope name still resolves.
    include: []
    exclude: []
  domain_files:
    include:
      - lib/domain/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  feature_ui:
    include:
      - lib/presentation/features/**/screens/*.dart
      - lib/presentation/features/**/screens/**/*.dart
      - lib/presentation/features/**/widgets/*.dart
      - lib/presentation/features/**/widgets/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  feature_card_list_dashboard_widgets:
    include:
      - lib/presentation/features/**/widgets/**/*_card.dart
      - lib/presentation/features/**/widgets/**/*_list.dart
      - lib/presentation/features/**/widgets/**/*_tile.dart
      - lib/presentation/features/dashboard/widgets/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  features:
    include:
      - lib/presentation/features/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  guard_python_non_constants:
    include: []
    exclude: []
  navigation_surfaces:
    include:
      - lib/main.dart
      - lib/presentation/features/**/*.dart
      - lib/presentation/shared/**/*.dart
      - lib/app/app.dart
      - lib/core/routes/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  non_data_layer_source:
    include:
      - lib/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
      - lib/data/**/*.dart
      - '**/data/**/*.dart'
  non_legacy_app_source:
    include:
      - lib/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
      - '**/legacy/**/*.dart'
  non_router_source:
    include:
      - lib/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
      - lib/core/routes/app_router.dart
      - '**/core/routes/app_router.dart'
  presentation_async_action_controller_files:
    include:
      - lib/presentation/features/flashcard-editor/providers/*_providers.dart
      - lib/presentation/features/deck-detail/providers/*_providers.dart
      - lib/presentation/features/library/providers/*_providers.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  provider_files:
    include:
      - lib/presentation/features/**/*_provider.dart
      - lib/presentation/features/**/*_providers.dart
      - lib/presentation/features/**/*_notifier.dart
      - lib/presentation/features/**/*_notifiers.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  screen_like_files:
    include:
      - lib/**/*_screen.dart
      - lib/**/*_page.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  screens:
    include:
      - lib/presentation/features/**/screens/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  shared_layout_files:
    include:
      - lib/presentation/shared/layouts/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  shared_widget_component_api_files:
    include:
      - lib/presentation/shared/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  shared_widget_dirs:
    # The `mx_*.dart` file + `Mx*` public-type contract targets the reusable
    # component library only (primitives/composites/layouts). `shared/screens/**`
    # holds full screens (e.g. the dev component gallery), which are legitimately
    # not Mx primitives — excluded so they don't trip the mx_ naming rules.
    include:
      - lib/presentation/shared/primitives/**/*.dart
      - lib/presentation/shared/composites/**/*.dart
      - lib/presentation/shared/layouts/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  theme_file:
    include:
      - lib/core/theme/**/app_theme.dart
      - lib/core/theme/app_theme.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  theme_sources:
    include:
      - lib/core/theme/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  ui:
    include:
      - lib/presentation/features/**/*.dart
      - lib/presentation/shared/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
      # Dev-only component showcase (not routed / not shipped) — don't lint as product UI.
      - lib/presentation/shared/screens/**
  ui_surfaces:
    include:
      - lib/main.dart
      - lib/presentation/features/**/*.dart
      - lib/presentation/shared/**/*.dart
      - lib/app/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  viewmodel_files:
    include:
      - lib/presentation/features/*/providers/*_provider.dart
      - lib/presentation/features/*/providers/*_providers.dart
      - lib/presentation/features/*/providers/*_notifier.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  widget_ui_files:
    include:
      - lib/main.dart
      - lib/presentation/features/**/screens/**/*.dart
      - lib/presentation/features/**/widgets/**/*.dart
      - lib/presentation/shared/**/*.dart
      - lib/app/app.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
  widget_ui_async_surfaces:
    include:
      - lib/main.dart
      - lib/presentation/features/**/screens/*.dart
      - lib/presentation/features/**/screens/**/*.dart
      - lib/presentation/features/**/widgets/*.dart
      - lib/presentation/features/**/widgets/**/*.dart
      - lib/presentation/shared/**/*.dart
      - lib/app/app.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - '**/*.config.dart'
      - '**/gen/**'
      - lib/presentation/features/**/providers/**

  non_route_definition_source:
    include:
      - lib/**/*.dart
    exclude:
      - lib/core/routes/app_routes.dart
      - lib/core/routes/app_router.dart
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/l10n/app_localizations*.dart
