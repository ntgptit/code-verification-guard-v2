# MemoX guard rules — domain: i18n
# Localization: no hardcoded user-facing strings in UI code; all copy flows through
# generated AppLocalizations (context.l10n) backed by ARB resources.
#
# Rule ID convention: memox.<domain>.<rule_name> — <domain> matches this file's slug.
# Scopes are defined in registries/projects/memox/config/scopes.yaml (and scopes/memox-scopes.yaml
# for the root-manifest ruleset). See README.md in this directory for the full authoring guide.
version: 1
metadata:
  id: memox-i18n
  name: MemoX Localization Rules
  description: No hardcoded user-facing strings; route all copy through generated l10n resources.
  owner: code-verification-guard
rules:
  - id: memox.i18n.no_hardcoded_strings
    type: regex
    severity: error
    enabled: true
    message: Avoid user-facing hardcoded strings in feature render, app layout, and shell code. (Inline `vi:` / `en:` locale
      pair strings are covered by `memox.i18n.no_inline_locale_pair_strings`.)
    scopes:
      - feature_ui
      - app_ui
    patterns:
      - Text\(\s*'(?:[^']*[A-Za-zÀ-ỹ][^']*)'
      - Text\(\s*"(?:[^"]*[A-Za-zÀ-ỹ][^"]*)"
      - (?:text|label|hint|tooltip|title|subtitle|message)\s*:\s*'(?:[^']*[A-Za-zÀ-ỹ][^']*)'
      - (?:text|label|hint|tooltip|title|subtitle|message)\s*:\s*"(?:[^"]*[A-Za-zÀ-ỹ][^"]*)"
    tags:
      - memox
      - i18n
  - id: memox.i18n.no_hardcoded_strings_shared
    type: regex
    severity: warning
    enabled: true
    message: Shared presentation widgets (dialogs, sheets, feedback) must not hardcode user-facing copy either; accept the
      string via constructor parameters or read it from `AppLocalizations`. Severity is warning until the existing shared
      copy is migrated to l10n, then this should be promoted to error.
    include:
      - lib/presentation/shared/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
    patterns:
      - Text\(\s*'(?:[^']*[A-Za-zÀ-ỹ][^']*)'
      - Text\(\s*"(?:[^"]*[A-Za-zÀ-ỹ][^"]*)"
      - (?:\btext|\blabel|\bhint|\btooltip|\btitle|\bsubtitle|\bmessage)\s*:\s*'(?:[^']*[A-Za-zÀ-ỹ][^']*)'
      - (?:\btext|\blabel|\bhint|\btooltip|\btitle|\bsubtitle|\bmessage)\s*:\s*"(?:[^"]*[A-Za-zÀ-ỹ][^"]*)"
    tags:
      - memox
      - i18n
    fix:
      hint: Pass the copy in from the calling feature (which reads context.l10n) or add an l10n key and read it here.
  - id: memox.i18n.no_inline_locale_pair_strings
    type: regex
    severity: error
    enabled: true
    message: Avoid inline `vi:` / `en:` locale pair strings in UI code; move user-facing copy into generated l10n resources.
    scopes:
      - ui_surfaces
    patterns:
      - \b(?:vi|en)\s*:\s*'(?:[^']*[A-Za-zÀ-ỹ][^']*)'
      - \b(?:vi|en)\s*:\s*"(?:[^"]*[A-Za-zÀ-ỹ][^"]*)"
    tags:
      - memox
      - i18n
  - id: memox.i18n.no_hardcoded_input_decoration_text
    type: regex
    severity: error
    enabled: true
    message: Hardcoded user-visible text in `hintText`, `helperText`, `labelText`, `errorText`, `placeholderText`, or `semanticsLabel`
      named parameters must not appear in UI code. Use `AppLocalizations` (via `context.l10n`) for all user-facing strings
      so the app stays translatable and copy-editable from a single source. Complements `memox.i18n.no_hardcoded_strings` which
      covers `Text(...)` and common widget labels.
    scopes:
      - feature_ui
    patterns:
      - (?:hintText|helperText|labelText|errorText|placeholderText|semanticsLabel)\s*:\s*'(?:[^']*[A-Za-z\u00C0-\u1EF9][^']*)'
      - (?:hintText|helperText|labelText|errorText|placeholderText|semanticsLabel)\s*:\s*"(?:[^"]*[A-Za-z\u00C0-\u1EF9][^"]*)"
    tags:
      - memox
      - i18n
      - l10n
    fix:
      hint: Replace the string literal with `context.l10n.yourKey` from the generated AppLocalizations. Add the key to app_en.arb
        and app_vi.arb first.
