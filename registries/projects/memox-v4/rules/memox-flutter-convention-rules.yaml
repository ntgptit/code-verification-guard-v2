# MemoX guard rules - domain: flutter_convention
# Flutter/Dart convention rules that are not covered by the base Dart/Flutter
# registries but are still useful for MemoX's Riverpod + hooks style.
#
# Rule ID convention: memox.<domain>.<rule_name> - <domain> matches this file's slug.
# Scopes are defined in registries/projects/memox/config/scopes.yaml (and scopes/memox-scopes.yaml
# for the root-manifest ruleset). See README.md in this directory for the full authoring guide.
version: 1
metadata:
  id: memox-flutter-convention
  name: MemoX Flutter Convention Rules
  description: Flutter widget, constructor, and lifecycle convention rules for MemoX.
  owner: code-verification-guard
rules:
  - id: memox.flutter_convention.no_legacy_key_constructor
    type: regex
    severity: warning
    enabled: true
    message: "Widget constructors should use `super.key` instead of legacy `Key? key` plus `super(key: key)`."
    scopes:
      - widget_ui_files
    patterns:
      - \bKey\??\s+key\b
      - :\s*super\s*\(\s*key\s*:\s*key\s*,?\s*\)
    tags:
      - memox
      - flutter
      - constructor
    fix:
      hint: Replace the legacy key parameter with `super.key` and keep the constructor const when possible.
  - id: memox.flutter_convention.widget_constructor_named_params
    type: regex
    severity: error
    enabled: true
    message: Public widget constructors should use named parameters for readability and safer call sites.
    scopes:
      - widget_ui_files
    mode: file
    patterns:
      - '(?s)\bclass\s+(?P<classname>[A-Z]\w*)\s+extends\s+(?:StatelessWidget|ConsumerWidget|HookWidget|HookConsumerWidget|StatefulWidget)\b[\s\S]{0,600}?\n\s*(?:const\s+)?(?P=classname)\s*\(\s*(?![\{\)])'
    tags:
      - memox
      - flutter
      - api-design
  - id: memox.flutter_convention.widget_constructor_should_be_const
    type: regex
    severity: warning
    enabled: true
    message: Stateless, consumer, and hook widgets should expose const constructors unless there is a real mutable runtime reason.
    scopes:
      - widget_ui_files
    mode: file
    patterns:
      - (?s)\bclass\s+(\w+)\s+extends\s+(?:StatelessWidget|ConsumerWidget|HookWidget|HookConsumerWidget)\b[\s\S]{0,800}?\n\s*(?!const\s+)\1\s*\(
    tags:
      - memox
      - flutter
      - const
  # v4: hooks-era rule. It recommends HookConsumerWidget, but memox-V4 has no
  # flutter_hooks and legitimately uses StatefulWidget/ConsumerStatefulWidget for
  # controller lifecycles (TabController, AnimationController, TextEditingController,
  # scroll/page controllers). CLAUDE.md bans only `setState` in feature UI, which is
  # enforced separately by `memox.flutter_convention.no_set_state`. Disabled to avoid
  # false positives on v4's standard no-hooks widget pattern.
  - id: memox.flutter_convention.no_stateful_widget_in_features
    type: regex
    severity: error
    enabled: false
    message: Feature UI should avoid StatefulWidget and State classes. Prefer Riverpod providers for app state and StatefulWidget only for genuine controller lifecycles.
    scopes:
      - feature_ui
    patterns:
      - \bextends\s+StatefulWidget\b
      - \bextends\s+ConsumerStatefulWidget\b
      - \bextends\s+State<\w+
      - \bextends\s+ConsumerState<\w+
    tags:
      - memox
      - flutter
      - lifecycle
      - riverpod
  - id: memox.flutter_convention.no_set_state
    type: regex
    severity: warning
    enabled: true
    message: Avoid `setState` in MemoX presentation code. Use Riverpod state or local controllers (via StatefulWidget) instead.
    scopes:
      - feature_ui
    patterns:
      - \bsetState\s*\(
    tags:
      - memox
      - flutter
      - state-management
  - id: memox.flutter_convention.no_build_context_fields
    type: regex
    severity: warning
    enabled: true
    message: Do not store `BuildContext` in fields. Pass context only through build or callback scope.
    scopes:
      - feature_ui
    mode: file
    patterns:
      - (?s)\bclass\s+\w+[^{]*\{(?:(?!\n\s*(?:@override\s*)?Widget\s+build\s*\().){0,1200}?\n\s*(?:(?:final|late)\s+)*BuildContext\s+\w+\s*(?:;|=)
    tags:
      - memox
      - flutter
      - lifecycle
  - id: memox.flutter_convention.no_private_widget_builder_methods_in_screens
    type: regex
    severity: warning
    enabled: true
    message: Screen files should extract UI sections into widgets instead of private `_buildXxx()` widget methods.
    scopes:
      - screen_like_files
    patterns:
      - \bWidget\s+_build[A-Z]\w*\s*\(
      - \bList<Widget>\s+_build[A-Z]\w*\s*\(
    tags:
      - memox
      - flutter
      - composition
  - id: memox.flutter_convention.no_mutable_children_list_in_build
    type: regex
    severity: warning
    enabled: true
    message: Avoid assembling widget children with mutable `children.add(...)`. Prefer collection-if, spread, or extracted widgets.
    scopes:
      - widget_ui_files
    patterns:
      - \bchildren\s*\.\s*add(?:All)?\s*\(
    tags:
      - memox
      - flutter
      - composition
  - id: memox.flutter_convention.global_key_requires_review
    type: regex
    severity: warning
    enabled: true
    message: GlobalKey in feature UI requires review. Prefer local controllers, form state wrappers, or provider-driven state.
    scopes:
      - feature_ui
    patterns:
      - \bGlobalKey(?:<[^>]+>)?\s*\(
    tags:
      - memox
      - flutter
      - lifecycle
  # v4: disabled. This is an opinionated advisory (Dart has no default lint banning
  # `!`). It already delivered its one-time value — driving the 43 -> 7 cleanup to
  # local promotion / `late` fields / guard clauses. The 7 remaining `!` are all
  # genuine, documented invariants (Dart-sanctioned rule #3), so as an ongoing gate
  # the rule only adds noise on correct code or demands an escape-hatch marker not
  # worth building for a warning. Re-enable (with a `// guard:allow-bang -- reason:`
  # marker convention) if `!`-hygiene enforcement is wanted later.
  - id: memox.flutter_convention.non_null_assertion_requires_review
    type: regex
    severity: warning
    enabled: false
    message: 'Avoid non-null assertion `!` in domain/presentation. Fix per Dart null-safety guidance, in order —
      (1) copy the nullable field/getter into a LOCAL variable so flow analysis promotes it
      (`final v = field; if (v != null) use(v);`) — fields/getters do not promote, locals do;
      (2) for a field that is always assigned after construction (e.g. set in a notifier `build()`),
      declare it `late T` instead of `T?` + `!` (a violated invariant then throws a clear LateInitializationError);
      (3) otherwise use a guard clause / early return. Reserve `!` only for a genuine invariant the compiler
      cannot express. (Data repos are excluded — Drift `row.read(col)!` and post-lookup `(await dao.find(id))!` are idiomatic.)'
    include:
      - lib/domain/**/*.dart
      - lib/presentation/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/l10n/app_localizations*.dart
    patterns:
      - '(?<!\bis)(?<=[\w\]\)])\s*!\s*(?![=])'
    tags:
      - memox
      - dart
      - null-safety
  - id: memox.flutter_convention.no_future_delayed_in_ui
    type: regex
    severity: warning
    enabled: true
    message: Do not use `Future.delayed` in UI logic to hide race, navigation, animation, or loading issues.
    scopes:
      - feature_ui
    patterns:
      - \bFuture\.delayed\s*\(
    tags:
      - memox
      - flutter
      - async
      - lifecycle
