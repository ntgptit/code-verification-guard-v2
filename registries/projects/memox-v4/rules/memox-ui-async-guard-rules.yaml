# MemoX guard rules â€” domain: ui_async_guard
# Async race-guard contract for State/ConsumerState: standalone `if (!mounted) return;` guards,
# `_snapshot` record comparisons instead of ad-hoc helpers, no `mounted` outside the UI layer.
#
# Rule ID convention: memox.<domain>.<rule_name> â€” <domain> matches this file's slug.
# Scopes are defined in registries/projects/memox/config/scopes.yaml (and scopes/memox-scopes.yaml
# for the root-manifest ruleset). See README.md in this directory for the full authoring guide.
version: 1

metadata:
  id: memox-ui-async-guard
  name: MemoX UI Async Guard Rules
  description: >-
    Regex-friendly conventions for async flows inside State / ConsumerState.
    Keeps `if (!mounted) return;` (required by `use_build_context_synchronously`)
    and standardizes the race-check half (snapshot of widget/route params)
    so reviewers and the guard can verify by exact pattern.

    Regex design notes:
      * Every `mounted` match uses `(?<![\w.])` so that field accesses on
        unrelated objects (e.g. `widget.mounted`, `controller.mounted`) do not
        false-positive.
      * Compound-condition rules look for `mounted` adjacent to `&&` / `||`
        directly, NOT inside a bounded `if (...)` window -- this avoids the
        nested-parenthesis blind spot that plagues `[^)]*` matchers.
      * `context.mounted` is handled with explicit patterns; never via the
        bare `mounted` lookbehind, since `context.` is a legitimate prefix.
  owner: code-verification-guard

rules:
  # ---------------------------------------------------------------------------
  # Rule 1: forbid ad-hoc race-check helpers (function declarations + calls).
  # Reason: devs invent names like _isCurrentRequest / _isAlive / _canContinue,
  # which regex cannot bind. Force a `_snapshot` record literal compared inline.
  # ---------------------------------------------------------------------------
  - id: memox.ui_async_guard.no_ad_hoc_race_helpers
    type: regex
    severity: error
    enabled: true
    message: >-
      Do not invent ad-hoc race-check helpers (e.g. `_isCurrentRequest`,
      `_isAlive`, `_canContinue`). Snapshot params into a record
      `final _snapshot = ( ... );` and compare inline:
      `if (_snapshot != (...)) return;`.
    scopes:
      - widget_ui_async_surfaces
    patterns:
      # Calls / declarations of forbidden helper names.
      - \b_(?:isCurrent(?:Request)?|isStillCurrent|isSameRequest|isAlive|canContinue|shouldContinue|isValidContext|isSafeToUpdate)\s*\(
      # Public-named variants someone might try.
      - \b(?:canContinueUi|guardUi)\s*\(
    tags:
      - memox
      - ui
      - async-guard

  # ---------------------------------------------------------------------------
  # Rule 3: forbid `mounted` / `context.mounted` outside the UI layer.
  # Reason: notifiers, viewmodels, use cases, repositories must not leak widget
  # lifecycle concerns. Use `ref.onDispose` / cancellation tokens instead.
  #
  # The bare-`mounted` pattern only fires when `mounted` appears as a guard --
  # inside `if (...)`, or adjacent to a boolean / ternary operator. This avoids
  # matching identifiers like a domain model named `mounted` (very unlikely but
  # not impossible).
  # ---------------------------------------------------------------------------
  - id: memox.ui_async_guard.no_mounted_outside_ui
    type: regex
    severity: error
    enabled: true
    message: >-
      `mounted` / `context.mounted` must not appear in notifiers, viewmodels,
      use cases, or repositories. Use `ref.onDispose` / cancellation tokens
      to handle disposal in the state layer.
    scopes:
      - viewmodel_files
    patterns:
      # context.mounted -- always banned in this scope.
      - \bcontext\.mounted\b
      # bare `mounted` as a guard inside `if (...)`.
      - \bif\s*\(\s*!?\s*(?<![\w.])mounted\b
      # bare `mounted` adjacent to boolean / ternary operators.
      - (?<![\w.])mounted\s*(?:\|\||&&|\?\s|\))
      - (?:\|\||&&)\s*!?\s*(?<![\w.])mounted\b
    tags:
      - memox
      - ui
      - async-guard

  # ---------------------------------------------------------------------------
  # Rule 4: forbid single-field `_snapshot` records.
  # Reason: a record with one field adds noise over a plain `final` variable.
  # The whole point of `_snapshot` is to bundle 2+ identity fields for a single
  # inequality check after `await`. One field => use a normal local var.
  #
  # Matches:
  #   final _snapshot = (entryRefId: widget.entryRefId,);
  #   final _snapshot = (widget.entryRefId,);
  # Does NOT match (2+ fields, intended use):
  #   final _snapshot = (entryType: widget.entryType, entryRefId: widget.entryRefId);
  # ---------------------------------------------------------------------------
  - id: memox.ui_async_guard.snapshot_requires_multiple_fields
    type: regex
    severity: error
    enabled: true
    message: >-
      `_snapshot` record must contain 2+ identity fields. For a single field,
      use a plain `final` local variable and compare directly after `await`.
    scopes:
      - widget_ui_async_surfaces
    patterns:
      # Single-field record (named or positional), with optional trailing comma.
      - \bfinal\s+_snapshot\s*=\s*\(\s*[^,()]+,?\s*\)\s*;
    tags:
      - memox
      - ui
      - async-guard
