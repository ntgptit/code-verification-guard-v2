# MemoX guard rules — domain: screen_shell
# Screen template contract: MxScaffold family as the top-level shell, gutter from the shell
# (not manual padding), reviewed layout literals, and watch-free template shells.
#
# Rule ID convention: memox.<domain>.<rule_name> — <domain> matches this file's slug.
# Scopes are defined in registries/projects/memox/config/scopes.yaml (and scopes/memox-scopes.yaml
# for the root-manifest ruleset). See README.md in this directory for the full authoring guide.
version: 1
metadata:
  id: memox-screen-shell
  name: MemoX Screen Shell Rules
  description: 'Screen shell/template contract: MxScaffold family usage, page gutter, screen-level layout values, and shell
    reactivity.'
  owner: code-verification-guard
rules:
  - id: memox.screen_shell.no_manual_page_gutter
    type: regex
    severity: error
    enabled: true
    message: 'Page gutter must come from `MxContentShell`, `MxScaffold`, or `AppLayout.pageInsets(...)`. Feature screens must
      not hardcode `ListView` or `SingleChildScrollView` body padding with `EdgeInsets...`, because that recreates double-gutter
      and bypasses tier-aware layout.

      '
    scopes:
      - screens
    patterns:
      - (?s)ListView\s*\((?:(?!\)).)*?padding:\s*(?:const\s+)?EdgeInsets\.
      - (?s)SingleChildScrollView\s*\((?:(?!\)).)*?padding:\s*(?:const\s+)?EdgeInsets\.
    mode: file
    tags:
      - memox
      - screen-shell
      - coding
      - architecture
  - id: memox.screen_shell.no_redundant_content_shell
    type: regex
    severity: error
    enabled: true
    message: 'MxScaffold/MxListScaffold/MxFormScaffold/MxStudyScaffold already wrap the body in `MxContentShell` (the page
      gutter + max-width cap). Feature screens/widgets must NOT wrap their content in another `MxContentShell` — it double-gutters
      and misaligns the screen against the rest of the app. Let the shell own the horizontal gutter; add only vertical spacing
      in the body. If a screen uses `MxScaffold(useShell: false)` or genuinely needs a nested width cap, add `// guard:allow-content-shell
      -- reason: ...` on the same line or the line immediately after.'
    scopes:
      - feature_ui
    patterns:
      - (?s)\bMxContentShell\s*\((?![^\n]*guard:allow-content-shell\s+--\s+reason:\s*\S)(?![^\n]*\n[^\n]*guard:allow-content-shell\s+--\s+reason:\s*\S)
    mode: file
    tags:
      - memox
      - screen-shell
      - design_system
      - ui-shell
  - id: memox.screen_shell.content_shell_escape_hatch_requires_reason
    type: regex
    severity: error
    enabled: true
    message: '`guard:allow-content-shell` must include `-- reason: ...` so the nested-shell exception stays reviewed.'
    scopes:
      - feature_ui
    patterns:
      - guard:allow-content-shell(?!\s+--\s+reason:\s*\S)
    tags:
      - memox
      - screen-shell
      - ui-shell
  - id: memox.screen_shell.use_mx_scaffold_family
    type: regex
    severity: warning
    enabled: true
    message: Feature screens that directly return a top-level shell should use `MxScaffold`, `MxListScaffold`, `MxFormScaffold`,
      or `MxStudyScaffold`. Keep provider watching and business state in smaller section widgets.
    scopes:
      - screen_like_files
    patterns:
      - (?s)\bclass\s+\w+(?:Screen|Page)\s+extends\s+(?:ConsumerWidget|ConsumerStatefulWidget|StatelessWidget|StatefulWidget)\s*\{(?:(?!\bclass\s).){0,1800}?\bWidget\s+build\s*\([^)]*\)\s*(?:=>\s*(?:const\s+)?(?!Mx(?:Scaffold|ListScaffold|FormScaffold|StudyScaffold)\s*\()[A-Z]\w+\s*\(|\{\s*(?:(?:final|const|var)\s+[^;]+;\s*){0,8}return\s+(?:const\s+)?(?!Mx(?:Scaffold|ListScaffold|FormScaffold|StudyScaffold)\s*\()[A-Z]\w+\s*\()
    mode: file
    tags:
      - memox
      - screen-shell
      - coding
      - architecture
      - ui-shell
  - id: memox.screen_shell.no_raw_padding_radius_color
    type: regex
    severity: error
    enabled: true
    message: 'Feature screens must not use raw numeric literals in `EdgeInsets`, `BorderRadius`, or `Radius` constructors.
      Prefer `MxSpace`, `MxGap`, `AppLayout` / `LayoutContext`, or shared layout tokens. Token-only constructor calls such
      as `EdgeInsets.symmetric(vertical: MxSpace.xs)` are allowed. Add `guard:layout-value-reviewed` only for reviewed raw-number
      exceptions. Route colors through `ColorScheme` / theme extensions, not `Color(...)` or `Colors.*`.'
    scopes:
      - screen_like_files
    patterns:
      - (?m)\b(?:EdgeInsets|BorderRadius|Radius)\.(?![^\n]*guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?![^\n]*\n\s*//
        guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?=[^\n;]*(?:\(\s*\d+|\b\d+(?:\.\d+)?\s*[,)]|:\s*\d+(?:\.\d+)?(?:\s*[,)]|\s*$)))
      - (?m)\b(?:Color\s*\(|Color\.from|Colors\.)(?![^\n]*guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?![^\n]*\n\s*//
        guard:layout-value-reviewed\s+--\s+reason:\s*\S)
    mode: file
    tags:
      - memox
      - screen-shell
      - coding
      - architecture
      - design_system
  - id: memox.screen_shell.base_template_no_hardcoded_layout_values
    type: regex
    severity: warning
    enabled: true
    message: 'Base screen templates should use layout/theme tokens for padding, radius, and color. Raw numeric literals in
      `EdgeInsets`, `BorderRadius`, or `Radius` require `guard:layout-value-reviewed -- reason: ...` on the same line or the
      line immediately after. Token-only constructor calls are allowed without the marker.'
    include:
      - lib/presentation/shared/composites/mx_scaffold.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
    patterns:
      - (?m)\b(?:EdgeInsets|BorderRadius|Radius)\.(?![^\n]*guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?![^\n]*\n\s*//
        guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?=[^\n;]*(?:\(\s*\d+|\b\d+(?:\.\d+)?\s*[,)]|:\s*\d+(?:\.\d+)?(?:\s*[,)]|\s*$)))
      - (?m)\b(?:Color\s*\(|Color\.from|Colors\.)(?![^\n]*guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?![^\n]*\n\s*//
        guard:layout-value-reviewed\s+--\s+reason:\s*\S)
    mode: file
    tags:
      - memox
      - screen-shell
      - coding
      - architecture
      - design_system
  - id: memox.screen_shell.no_raw_scaffold
    type: regex
    severity: error
    enabled: true
    message: Feature code should migrate away from raw `Scaffold` toward a shared screen shell.
    scopes:
      - features
    patterns:
      - \bScaffold\s*\(
    tags:
      - memox
      - screen-shell
      - architecture
  # v4: disabled — assumes a "template-only shell" category that v4 doesn't have.
  # Every v4 screen is a ConsumerWidget that does `ref.watch(xController)` and renders
  # the MxScaffold via `AsyncValue.when(loading/error/data)` — the standard Riverpod
  # screen idiom (theme/library/settings/game/... 14 screens). The watch drives the
  # WHOLE screen (three states => three different scaffolds), so it is structurally
  # un-moveable into a section; requiring the escape hatch on ~all screens signals the
  # rule default is wrong for v4. Re-enable if v4 adopts template-only shells.
  - id: memox.screen_shell.template_shell_no_ref_watch
    type: regex
    severity: error
    enabled: false
    message: 'Template-only screen shells that return `MxScaffold`, `MxListScaffold`, `MxFormScaffold`, or `MxStudyScaffold`
      should not also watch providers in the same build body. Move provider watching into a section widget, or add `// guard:allow-screen-watch
      -- reason: ...` when the screen shell must stay reactive.'
    scopes:
      - screen_like_files
    patterns:
      - (?s)Widget\s+build\s*\(\s*BuildContext\s+context\s*,\s*WidgetRef\s+ref\s*\)\s*\{(?![\s\S]{0,1600}guard:allow-screen-watch\s+--\s+reason:\s*\S)[\s\S]{0,1600}?\bref\.watch\s*\([^)]+\)[\s\S]{0,1600}?\breturn\s+(?:const\s+)?Mx(?:Scaffold|ListScaffold|FormScaffold|StudyScaffold)\s*\(
    mode: file
    tags:
      - memox
      - screen-shell
      - state-management
      - ui-shell
  - id: memox.screen_shell.watch_escape_hatch_requires_reason
    type: regex
    severity: error
    enabled: true
    message: '`guard:allow-screen-watch` must include `-- reason: ...` so template-shell provider watches stay reviewed.'
    scopes:
      - screen_like_files
    patterns:
      - guard:allow-screen-watch(?!\s+--\s+reason:\s*\S)
    tags:
      - memox
      - screen-shell
      - state-management
      - ui-shell
