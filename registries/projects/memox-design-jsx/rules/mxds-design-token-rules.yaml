# MemoX Design System (JSX) guard rules — domain: design_token
# Layer-1 contract: every visual value is a `--memox-*` token. Above the token
# layer (components + screens) there must be NO raw visual literals — colors and
# sizes go through `var(--memox-*)`. Mirrors the raw-value selectors in
# `docs/design/MemoX Design System/_adherence.oxlintrc.json` (the design-system's
# own oxlint adherence config), translated to this engine's regex matcher.
#
# Rule ID convention: mxds.<domain>.<rule_name> — <domain> matches this file slug
# (`mxds` is the memox-design-jsx ruleset namespace; the ruleset name carries
# hyphens which are not legal in rule ids). Scopes live in config/scopes.yaml.
#
# Severity is `error`: the kit is fully tokenised, so any raw literal is a
# regression. These rules cover both `px` literals AND bare unitless numbers in
# JSX inline styles (React renders them as px) — color, spacing, sizing, radius,
# typography weight/size, line-height and letter-spacing must all flow through a
# `--memox-*` token. Genuinely unitless props (opacity, zIndex, flex, and 0)
# are intentionally not flagged.
version: 1

metadata:
  id: memox-design-jsx-design-token
  name: MemoX Design System (JSX) Design Token Rules
  description: >-
    Enforce design-token usage across the Mx* components and the app screen kit.
    Raw hex colors, raw px literals, and bare unitless numbers in inline styles
    (fontWeight, fontSize, gap/padding/margin, width/height, borderRadius,
    lineHeight, letterSpacing) must not appear above the token layer; use
    var(--memox-*) tokens instead.
  owner: code-verification-guard

rules:
  - id: mxds.design_token.no_raw_hex_color
    type: regex
    severity: error
    enabled: true
    message: >-
      Raw hex color literal in a design-system component/screen. Colors above the
      token layer must use a `var(--memox-*)` color token, never a `#rrggbb`
      literal — changing a value is free, but raw colors bypass the theme and
      break dark mode.
    scopes:
      - ds_jsx
    patterns:
      - '#[0-9A-Fa-f]{3,8}\b'
    tags:
      - mxds
      - design
      - design-system
      - color
      - token
    fix:
      hint: Replace the hex literal with a color token, e.g. var(--memox-primary) / var(--memox-text).

  - id: mxds.design_token.no_raw_px_value
    type: regex
    severity: error
    enabled: true
    message: >-
      Raw `px` literal in a design-system component/screen. Spacing, radius, and
      sizing above the token layer must use a `var(--memox-*)` token (space /
      radius / size scale) instead of a hardcoded pixel value.
    scopes:
      - ds_jsx
    patterns:
      - '\b\d+px\b'
    tags:
      - mxds
      - design
      - design-system
      - spacing
      - token
    fix:
      hint: Replace the px literal with a token, e.g. var(--memox-space-4) / var(--memox-radius-card).

  - id: mxds.design_token.no_raw_spacing_value
    type: regex
    severity: error
    enabled: true
    message: >-
      Raw numeric spacing/offset in a JSX inline style (React renders it as px).
      gap / padding / margin / inset and edge offsets must use a
      `var(--memox-space-*)` token instead of a bare number.
    scopes:
      - ds_jsx
    patterns:
      - '\b(?:gap|rowGap|columnGap|padding|paddingTop|paddingRight|paddingBottom|paddingLeft|margin|marginTop|marginRight|marginBottom|marginLeft|inset|top|left|right|bottom)\s*:\s*-?[1-9]\d*\b'
    tags:
      - mxds
      - design
      - design-system
      - spacing
      - token
    fix:
      hint: "Replace with a spacing token, e.g. gap: 'var(--memox-space-2)'. Value 0 and unitless props (flex, opacity, zIndex) are allowed."

  - id: mxds.design_token.no_raw_dimension_value
    type: regex
    severity: error
    enabled: true
    message: >-
      Raw numeric width/height in a JSX inline style (React renders it as px).
      Fixed element dimensions must use a `var(--memox-size-*)` token; fluid
      sizing uses `%` / `flex` / `auto` strings.
    scopes:
      - ds_jsx
    patterns:
      - '\b(?:width|height|minHeight|maxHeight|minWidth|maxWidth)\s*:\s*[1-9]\d*\b'
    tags:
      - mxds
      - design
      - design-system
      - sizing
      - token
    fix:
      hint: "Replace with a size token, e.g. width: 'var(--memox-size-sm)'. Percentages, flex, and 0 are allowed."

  - id: mxds.design_token.no_raw_radius_value
    type: regex
    severity: error
    enabled: true
    message: >-
      Raw numeric border radius in a JSX inline style (React renders it as px).
      Use a `var(--memox-radius-*)` token instead of a bare number.
    scopes:
      - ds_jsx
    patterns:
      - '\bborder(?:Top|Bottom)?(?:Left|Right)?Radius\s*:\s*[1-9]\d*\b'
    tags:
      - mxds
      - design
      - design-system
      - radius
      - token
    fix:
      hint: "Replace with a radius token, e.g. borderRadius: 'var(--memox-radius-card)'. '50%' / '999px' shapes stay as strings."

  - id: mxds.design_token.no_raw_font_weight
    type: regex
    severity: error
    enabled: true
    message: >-
      Raw numeric font weight in a JSX inline style. Use a
      `var(--memox-font-weight-*)` token (regular / medium / semibold / bold /
      extrabold) instead of a numeric weight.
    scopes:
      - ds_jsx
    patterns:
      - '\bfontWeight\s*:\s*[1-9]\d*\b'
    tags:
      - mxds
      - design
      - design-system
      - typography
      - token
    fix:
      hint: "Replace, e.g. fontWeight: 'var(--memox-font-weight-bold)'."

  - id: mxds.design_token.no_raw_font_size_value
    type: regex
    severity: error
    enabled: true
    message: >-
      Raw numeric font size in a JSX inline style (React renders it as px). Text
      uses a `var(--memox-font-size-*)` token; Material Symbols glyphs use a
      `var(--memox-icon-size-*)` token.
    scopes:
      - ds_jsx
    patterns:
      - '\bfontSize\s*:\s*[1-9]\d*\b'
    tags:
      - mxds
      - design
      - design-system
      - typography
      - token
    fix:
      hint: "Replace, e.g. fontSize: 'var(--memox-font-size-base)' or 'var(--memox-icon-size-md)'."

  - id: mxds.design_token.no_raw_typography_metric
    type: regex
    severity: error
    enabled: true
    message: >-
      Raw line-height or letter-spacing in a JSX inline style. Use a
      `var(--memox-line-height-*)` / `var(--memox-letter-spacing-*)` token
      instead of a bare ratio or em literal.
    scopes:
      - ds_jsx
    patterns:
      - '\blineHeight\s*:\s*[0-9]'
      - '\bletterSpacing\s*:\s*''-?[.0-9]'
    tags:
      - mxds
      - design
      - design-system
      - typography
      - token
    fix:
      hint: "Replace, e.g. lineHeight: 'var(--memox-line-height-normal)', letterSpacing: 'var(--memox-letter-spacing-wide)'."

  # --- Layer-2 stylesheet (components.css) ---------------------------------
  # The base-class CSS legitimately holds component-intrinsic pixel dimensions
  # (switch / avatar / control sizes) and sub-grid tuning values, so raw px is
  # NOT banned there. Raw COLORS are — every color must stay theme-switchable
  # via a token. This is a regression guard (the stylesheet is colour-clean).
  - id: mxds.design_token.no_raw_hex_color_css
    type: regex
    severity: error
    enabled: true
    message: >-
      Raw hex color literal in the design-system stylesheet. Every color in
      components.css must use a `var(--memox-*)` color token so light/dark theming
      keeps working — never a `#rrggbb` literal. (Token files define the values.)
    scopes:
      - ds_css
    patterns:
      - '#[0-9A-Fa-f]{3,8}\b'
    tags:
      - mxds
      - design
      - design-system
      - color
      - token
      - css
    fix:
      hint: "Replace the hex literal with a color token, e.g. color: var(--memox-text); background: var(--memox-surface)."
