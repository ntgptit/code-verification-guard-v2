version: 1

ruleset:
  name: memox-design-jsx

profile: local

config:
  profiles: config/profiles.yaml
  scopes: config/scopes.yaml
  overrides: config/overrides.yaml

# Shared bundles selected from the root guard-manifest.yaml.
# `common` generic hygiene is constrained to the design-system directory by the
# scope redefinitions in config/scopes.yaml.
#
# `languages` is intentionally empty: the shared typescript/react rule bundles
# are scoped to `src/**`, so they match nothing under `docs/design/...` and the
# engine's rule_without_targets check (correctly) flags them as dead. Repointing
# their scopes here would activate `react.no_inline_style`, which contradicts the
# kit's token-based inline styles. JSX-specific policy lives in rules/ instead.
rule_sets:
  common: true
  languages: []
  projects: []

rules:
  - rules/mxds-design-token-rules.yaml
  - rules/mxds-component-contract-rules.yaml
  - rules/mxds-component-prop-rules.yaml
  - rules/mxds-layout-rules.yaml
  - rules/mxds-naming-rules.yaml
