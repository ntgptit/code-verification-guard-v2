version: 1

metadata:
  id: memox-ui
  name: MemoX UI Rules
  description: Project-specific UI rules for MemoX.
  owner: code-verification-guard

rules:
  - id: memox.no_raw_card
    type: regex
    severity: error
    enabled: true
    message: MemoX must not use Card directly. Use AppCard.
    scopes:
      - flutter_source
    exclude:
      - "lib/core/widgets/**"
      - "lib/shared/widgets/**"
      - "lib/presentation/shared/widgets/**"
    patterns:
      - "\\bCard\\s*\\("
    tags:
      - memox
      - ui
      - design-system
    fix:
      hint: Replace raw Card usage with AppCard.

  - id: memox.no_async_value_when
    type: regex
    severity: error
    enabled: true
    message: MemoX must not use AsyncValue.when directly. Use AppAsyncBuilder.
    scopes:
      - flutter_source
    exclude:
      - "lib/core/widgets/**"
      - "lib/shared/widgets/**"
    patterns:
      - "\\.when\\s*\\("
    tags:
      - memox
      - ui
      - state
    fix:
      hint: Wrap AsyncValue rendering with AppAsyncBuilder.

  - id: memox.shared_widget_build_lines
    type: max_build_lines
    severity: warning
    enabled: true
    message: Shared widget build() is too long. Split visual states into private helpers while preserving the public shared widget API.
    include:
      - lib/presentation/shared/**/*.dart
    exclude:
      - "**/*.g.dart"
      - "**/*.freezed.dart"
    max_lines: 140
    count_mode: logical
    tags:
      - memox
      - ui
      - maintainability
      - shared-widget
    fix:
      hint: Extract private build helpers or smaller internal widgets without widening the shared widget public API.
