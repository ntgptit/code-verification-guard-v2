version: 1

overrides:
  disabled_rules: []
  severity: {}
  rule_options:
    memox.provider_file_naming:
      exclude:
        - '**/*.g.dart'
        - '**/*.freezed.dart'
    memox.app_string_normalization_uses_string_utils:
      exclude:
        - '**/*.g.dart'
        - '**/*.freezed.dart'
        - lib/core/utils/string_utils.dart
        - lib/data/datasources/local/tables/*.dart
    common.no_placeholder_implementation:
      exclude:
        - test/**
        - integration_test/**
    common.max_file_lines:
      include:
        - lib/**/*.dart
      exclude:
        - '**/*.g.dart'
        - '**/*.freezed.dart'
        - lib/l10n/generated/**
        - test/**
        - integration_test/**
      max_lines: 500
      count_mode: logical
    common.no_large_source_file:
      include:
        - lib/**/*.dart
      exclude:
        - '**/*.g.dart'
        - '**/*.freezed.dart'
        - lib/l10n/generated/**
        - test/**
        - integration_test/**
      max_lines: 500
      count_mode: logical
    flutter.max_build_lines:
      count_mode: logical
      exclude:
        - lib/presentation/shared/**
    flutter.no_hardcoded_duration:
      exclude:
        - lib/core/**
        - lib/data/**
        - lib/domain/**
