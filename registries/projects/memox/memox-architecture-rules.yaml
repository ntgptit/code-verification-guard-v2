version: 1
metadata:
  id: memox-architecture
  name: MemoX Architecture Rules
  description: Project-specific architecture rules for MemoX, including rules ported from the legacy guard policy.
  owner: code-verification-guard
rules:
  - id: memox.domain_no_flutter_import
    type: forbidden_import
    severity: error
    enabled: true
    message: The domain layer must not import Flutter packages.
    include:
      - lib/features/**/domain/**/*.dart
    patterns:
      - package:flutter/
    tags:
      - memox
      - architecture
    fix:
      hint: Keep domain code framework-independent.
  - id: memox.domain_no_data_import
    type: forbidden_import
    severity: error
    enabled: true
    message: The domain layer must not import the data layer.
    include:
      - lib/features/**/domain/**/*.dart
    patterns:
      - /data/
    tags:
      - memox
      - architecture
    fix:
      hint: Depend on domain abstractions instead of data implementations.
  - id: memox.domain_no_presentation_import
    type: forbidden_import
    severity: error
    enabled: true
    message: The domain layer must not import the presentation layer.
    include:
      - lib/features/**/domain/**/*.dart
    patterns:
      - /presentation/
    tags:
      - memox
      - architecture
    fix:
      hint: Move shared contracts into the domain layer.
  - id: memox.presentation_no_data_import
    type: forbidden_import
    severity: error
    enabled: true
    message: The presentation layer must not import the data layer directly.
    include:
      - lib/features/**/presentation/**/*.dart
    patterns:
      - /data/
    tags:
      - memox
      - architecture
    fix:
      hint: Access data through application services or use cases.
  - id: memox.domain_no_flutter_foundation_import
    type: regex
    severity: error
    enabled: true
    message: Domain entities and services must stay pure Dart and must not import Flutter framework annotations.
    scopes:
      - domain_files
    patterns:
      - import\s+'package:flutter/foundation\.dart'
    tags:
      - memox
      - architecture
  - id: memox.presentation_no_dart_io_imports
    type: regex
    severity: error
    enabled: true
    message: Feature screens and widgets must not read files or platform IO directly; route platform access through core/data
      helpers.
    scopes:
      - feature_ui
    patterns:
      - import\s+'dart:io
    tags:
      - memox
      - architecture
  - id: memox.presentation_no_broad_dart_ui_imports
    type: regex
    severity: error
    enabled: true
    message: Presentation code that needs low-level engine APIs must import only the explicit symbols it uses.
    scopes:
      - ui
    patterns:
      - import\s+'dart:ui';
    tags:
      - memox
      - architecture
  - id: memox.study_session_no_deep_relative_imports
    type: regex
    severity: error
    enabled: true
    message: Study session widgets may use relative imports only inside the local widget subtree; cross-layer and cross-feature
      imports must use `package:memox/...`.
    scopes:
      - study_session_widget_files
    patterns:
      - ^import\s+'(?:\.\./){3,}[^']+';
    tags:
      - memox
      - architecture
  - id: memox.study_session_widgets_no_progress_formula
    type: regex
    severity: error
    enabled: true
    message: Study session widgets should bind display-ready progress values from domain helpers instead of recalculating
      progress and percent in build methods.
    scopes:
      - study_session_widget_files
    patterns:
      - \boverallStudyProgress\s*\(
      - \blocalCorrectGradeCount\s*\(
    tags:
      - memox
      - architecture
  - id: memox.presentation_async_action_controllers_use_runner
    type: regex
    severity: error
    enabled: true
    message: Presentation action controllers should route action failure state through the shared async action runner instead
      of hand-writing AsyncError boilerplate.
    scopes:
      - presentation_async_action_controller_files
    patterns:
      - state\s*=\s*AsyncError<void>\s*\(
    tags:
      - memox
      - architecture
  - id: memox.cross_feature_study_provider_imports
    type: regex
    severity: error
    enabled: true
    message: Non-study presentation features must not import Study feature providers directly; expose shared revision or settings
      boundaries outside the feature.
    scopes:
      - features
    patterns:
      - import\s+'(?:\.\./)+study/providers/
      - import\s+'(?:\.\./)+app/di/study/study_revision_providers\.dart'
      - import\s+'package:memox/presentation/features/study/providers/
      - import\s+'package:memox/app/di/study/study_revision_providers\.dart'
    tags:
      - memox
      - architecture
  - id: memox.centralized_shared_preferences_provider
    type: regex
    severity: error
    enabled: true
    message: Only the app-level DI provider may call `SharedPreferences.getInstance()`; feature DI must reuse `sharedPreferencesProvider`.
    scopes:
      - core_di
    patterns:
      - SharedPreferences\.getInstance\s*\(
    exclude:
      - lib/app/di/providers.dart
      - providers.dart
    tags:
      - memox
      - architecture
  - id: memox.core_di_no_ui_imports
    type: regex
    severity: error
    enabled: true
    message: '`lib/app/di/*` should wire infrastructure only and must not depend on presentation modules.'
    scopes:
      - core_di
    patterns:
      - import\s+'package:memox/presentation/
    tags:
      - memox
      - architecture
  - id: memox.core_di_no_state_notifiers
    type: regex
    severity: error
    enabled: true
    message: '`lib/app/di/*` must not define feature state or generated Riverpod notifier classes.'
    scopes:
      - core_di
    patterns:
      - class\s+\w+\s+extends\s+_\$\w+
    tags:
      - memox
      - architecture
  - id: memox.app_router_no_feature_screen_imports
    type: regex
    severity: error
    enabled: true
    message: '`app_router.dart` must compose feature route registries instead of importing feature screens or widgets directly.'
    include:
      - lib/app/router/app_router.dart
    patterns:
      - import\s+'(?:\.\./)+presentation/features/[^']+/(?:screens|widgets)/
      - import\s+'package:memox/presentation/features/[^/]+/(?:screens|widgets)/
    tags:
      - memox
      - architecture
  - id: memox.ui_direct_dependency_creation
    type: regex
    severity: error
    enabled: true
    message: Widget and app layout files must not instantiate infrastructure dependencies directly; wire them through provider
      injection.
    scopes:
      - widget_ui_files
    patterns:
      - \bDio\s*\(
      - \b(?:http\.)?Client\s*\(
      - \b[A-Z]\w*RepositoryImpl\s*\(
      - \b[A-Z]\w*Database\s*\(
      - SharedPreferences\.getInstance\s*\(
    tags:
      - memox
      - architecture
  - id: memox.notifier_direct_dependency_creation
    type: regex
    severity: error
    enabled: true
    message: Feature notifier and viewmodel files must not instantiate infrastructure dependencies directly; read injected
      dependencies from providers instead.
    scopes:
      - viewmodel_files
    patterns:
      - \bDio\s*\(
      - \b(?:http\.)?Client\s*\(
      - \b[A-Z]\w*RepositoryImpl\s*\(
      - \b[A-Z]\w*Database\s*\(
      - SharedPreferences\.getInstance\s*\(
    tags:
      - memox
      - architecture
  - id: memox.feature_provider_direct_infrastructure_access
    type: regex
    severity: error
    enabled: true
    message: Feature provider/viewmodel files must not talk directly to repository, storage, reminder, device-settings, daily-task-checker,
      or event-bus providers. Route those dependencies through a use case or facade boundary.
    scopes:
      - viewmodel_files
    patterns:
      - ref\.(?:read|watch)\s*\(\s*\w+RepositoryProvider\b
      - ref\.(?:read|watch)\s*\(\s*(?:storageServiceProvider|reminderServiceProvider|deviceSettingsServiceProvider|dailyTaskCheckerProvider|eventBusProvider)\b
    tags:
      - memox
      - architecture
  - id: memox.tts_controller_uses_playback_policy
    type: regex
    severity: error
    enabled: true
    message: TTS presentation controllers must not hardcode which flashcard side can be spoken; route that business rule through
      `TtsPlaybackPolicy`.
    include:
      - lib/presentation/features/tts/providers/tts_controller_notifier.dart
    patterns:
      - if\s*\([^\)]*TtsTextSide\.front
      - side\s*!=\s*TtsTextSide\.front
    tags:
      - memox
      - architecture
  - id: memox.feature_theme_token_imports
    type: regex
    severity: error
    enabled: true
    message: Feature-layer source must not import raw theme source files such as `app_colors.dart` or `app_typography.dart`;
      consume UI values through theme/context accessors or shared widgets instead.
    scopes:
      - features
    patterns:
      - import\s+'package:memox/core/theme/tokens/app_colors\.dart'
      - import\s+'package:memox/core/theme/tokens/app_typography\.dart'
      - import\s+'package:memox/core/theme/tokens/app_spacing\.dart'
      - import\s+'package:memox/core/theme/tokens/app_radius\.dart'
      - import\s+'package:memox/core/theme/tokens/app_elevation\.dart'
      - import\s+'package:memox/core/theme/tokens/app_motion\.dart'
      - import\s+'package:memox/core/theme/tokens/app_opacity\.dart'
      - import\s+'package:memox/core/theme/responsive/app_breakpoints\.dart'
      - import\s+'package:memox/core/theme/tokens/app_icon_sizes\.dart'
    tags:
      - memox
      - architecture
      - design_system
  - id: memox.features_no_direct_text_theme
    type: regex
    severity: error
    enabled: true
    message: 'Feature code must not choose Material text-theme roles directly. Route semantic typography through `MxText(role:
      ...)` so the same UI intent resolves to the same scale across screens.'
    scopes:
      - features
    patterns:
      - Theme\.of\(context\)\.textTheme\.
      - \.textTheme\.(?:display|headline|title|body|label)
    tags:
      - memox
      - architecture
      - design_system
  - id: memox.screen_file_naming
    type: file_name
    severity: error
    enabled: true
    message: Files inside feature `screens/` folders must use the `_screen.dart` or `_page.dart` suffix.
    scopes:
      - screens
    pattern: ^[a-z0-9_]+_(?:screen|page)\.dart$
    tags:
      - memox
      - architecture
  - id: memox.di_provider_export_wrappers
    type: regex
    severity: error
    enabled: true
    message: Provider-owned files under `lib/app/di/**` must contain concrete provider wiring, not export-wrapper shortcuts.
    include:
      - lib/app/di/**/*_providers.dart
    patterns:
      - ^export\s+
    tags:
      - memox
      - architecture
  - id: memox.theme_file_no_riverpod
    type: regex
    severity: error
    enabled: true
    message: '`lib/core/theme/app_theme.dart` should contain theme definitions only, not Riverpod providers or notifier classes.'
    scopes:
      - theme_file
    patterns:
      - '@riverpod'
      - '@Riverpod'
      - class\s+\w+\s+extends\s+_\$\w+
    tags:
      - memox
      - architecture
  - id: memox.no_theme_export_wrappers
    type: regex
    severity: error
    enabled: true
    message: '`lib/core/theme/**` should not use export-wrapper files; import the real theme source file directly.'
    scopes:
      - theme_sources
    patterns:
      - ^export\s+
    tags:
      - memox
      - architecture
  - id: memox.shared_widget_file_naming
    type: file_name
    severity: error
    enabled: true
    message: Widget-bearing shared files must use the `mx_*.dart` naming contract.
    scopes:
      - shared_widget_dirs
    pattern: ^mx_[a-z0-9_]+\.dart$
    tags:
      - memox
      - architecture
  - id: memox.shared_widget_public_type_prefix
    type: regex
    severity: error
    enabled: true
    message: Public types in widget-bearing shared files must use the `Mx*` prefix.
    scopes:
      - shared_widget_dirs
    patterns:
      - ^\s*(?:abstract\s+final\s+class|abstract\s+class|class)\s+(?!Mx|_)[A-Z]\w*
      - ^\s*enum\s+(?!Mx|_)[A-Z]\w*
      - ^\s*typedef\s+(?!Mx|_)[A-Z]\w*
    tags:
      - memox
      - architecture
  - id: memox.shared_widget_no_app_wiring
    type: regex
    severity: error
    enabled: true
    message: Shared widgets must remain provider-free and app-wiring-free.
    scopes:
      - shared_widget_dirs
    patterns:
      - import\s+'package:flutter_riverpod/flutter_riverpod\.dart';
      - \bConsumerWidget\b
      - \bConsumerStatefulWidget\b
      - \bConsumerState\b
      - \bWidgetRef\b
      - import\s+'package:memox/app/
      - import\s+'package:memox/app/router/
      - import\s+'package:memox/domain/
      - import\s+'package:memox/presentation/features/
      - import\s+'package:go_router/go_router\.dart';
    tags:
      - memox
      - architecture
  - id: memox.shared_widget_no_public_mx_text_role_api
    type: regex
    severity: error
    enabled: true
    message: Shared components should own typography semantics internally instead of exposing arbitrary `MxTextRole` parameters.
    scopes:
      - shared_widget_component_api_files
    patterns:
      - \bMxTextRole\??\s+[A-Za-z_][A-Za-z0-9_]*
    tags:
      - memox
      - architecture
      - design_system
  - id: memox.app_bar_header_requires_toolbar_icon_buttons
    type: regex
    severity: error
    enabled: true
    message: App bar and feature header icon actions must use `MxIconButton.toolbar(...)` so normal Back/More actions stay
      visually quiet.
    scopes:
      - app_bar_header_files
    patterns:
      - \bMxIconButton\s*\(
    tags:
      - memox
      - architecture
      - design_system
  - id: memox.app_bar_header_no_framed_buttons
    type: regex
    severity: error
    enabled: true
    message: App bar and feature header actions should not use framed button surfaces unless the state is explicitly selected,
      active, or destructive.
    scopes:
      - app_bar_header_framed_button_files
    patterns:
      - \bMxPrimaryButton\s*\(
      - \bMxSecondaryButton\s*\(
      - \bMxIconButton\.(?:filled|filledTonal|outlined)\s*\(
    tags:
      - memox
      - architecture
      - design_system
  - id: memox.no_raw_ink_surface
    type: regex
    severity: error
    enabled: true
    message: Interactive UI surfaces must route hover, focus, and pressed overlays through a shared shaped tap primitive instead
      of hand-rolled `InkWell`, `InkResponse`, or tap-only `GestureDetector` usage.
    scopes:
      - ui
    exclude:
      - lib/presentation/shared/widgets/mx_tappable.dart
    patterns:
      - \bInkWell\s*\(
      - \bInkResponse\s*\(
      - '(?s)GestureDetector\s*\((?:(?!\)).)*?\bonTap\s*:'
    mode: file
    tags:
      - memox
      - architecture
      - design_system
  - id: memox.ink_must_have_shape
    type: regex
    severity: error
    enabled: true
    message: If a shared widget keeps a raw `InkWell`, it must pass `customBorder:` or `borderRadius:` so the interaction
      overlay matches the visual shape.
    scopes:
      - shared_widget_dirs
    patterns:
      - (?s)InkWell\s*\((?:(?!customBorder\s*:|borderRadius\s*:).)*?\)
    mode: file
    tags:
      - memox
      - architecture
      - design_system
  - id: memox.shared_layout_magic_numbers
    type: regex
    severity: error
    enabled: true
    message: Shared layout contracts must not embed raw numeric width caps or variant-specific layout numbers inline. Define
      a named constant or route the value through `ResponsiveRules`/a preset instead.
    scopes:
      - shared_layout_files
    patterns:
      - =>\s*\d+(?:\.\d+)?\b
      - '\?\s*\d+(?:\.\d+)?\s*:'
      - \?\s*null\s*:\s*\d+(?:\.\d+)?\b
    tags:
      - memox
      - architecture
