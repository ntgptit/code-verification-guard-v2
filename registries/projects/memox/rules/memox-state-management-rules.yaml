version: 1

metadata:
  id: memox-state-management
  name: MemoX State Management Rules
  description: Project-specific state management rules for MemoX.
  owner: code-verification-guard

rules:
  - id: memox.infrastructure_provider_keep_alive_required
    type: regex
    severity: warning
    enabled: true
    message: >-
      Infrastructure providers for DB, repository, client, service, DAO, store, gateway, codec, runner, strategy,
      or auth resources should use `@Riverpod(keepAlive: true)` so expensive app-wide dependencies are not disposed on
      navigation churn. Screen/search/input state may remain autoDispose.
    include:
      - lib/app/di/**/*.dart
      - lib/app/router/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
    patterns:
      - '(?s)@riverpod\s*(?![\s\S]{0,200}\b\w*UseCase(?:>|[\s\r\n]+\w+\s*\())(?:\r?\n\s*)+(?:Future<[^>]*(?:Database|Repository|Client|Service|Dao|Store|Gateway|Codec|Runner|Strategy|Auth|Dio)[^>]*>|(?:[A-Z]\w*(?:Database|Repository|Client|Service|Dao|Store|Gateway|Codec|Runner|Strategy|Auth)|Dio))\s+\w+\s*\('
    mode: file
    tags:
      - memox
      - state-management
      - riverpod
      - lifecycle

  - id: memox.provider_state_object_too_large
    type: regex
    severity: warning
    enabled: true
    message: Provider state objects with more than 7 fields should be split into smaller read models or justified by a
      clear cohesion boundary.
    scopes:
      - viewmodel_files
    patterns:
      - '(?s)\b(?:final\s+)?class\s+\w*State\s*\{(?:(?!\n\}).)*?\b(?:final\s+[\w<>, ?]+\s+\w+\s*;\s*){8,}'
    mode: file
    tags:
      - memox
      - state-management
      - maintainability

  - id: memox.no_broad_provider_invalidation
    type: regex
    severity: error
    enabled: true
    message: Mutation and command providers must not invalidate broad home/all/list/overview providers when a deck/card/folder
      scoped refresh is enough. Invalidate the narrow family provider or update state locally.
    scopes:
      - provider_files
    patterns:
      - '\bref\.invalidate\s*\(\s*(?:homeProvider|allProvider|libraryOverviewProvider|dashboardOverviewProvider|progressOverviewProvider)\b'
      - '\bref\.invalidate\s*\(\s*[A-Za-z0-9_]*(?:All|Home|List|Overview)[A-Za-z0-9_]*Provider\s*\)'
    tags:
      - memox
      - state-management
      - invalidation

  - id: memox.command_provider_repository_ref_read
    type: regex
    severity: error
    enabled: true
    message: Command methods should use `ref.read(...RepositoryProvider)` for one-shot repository access; use `ref.watch`
      only when the command result must be reactive to repository replacement.
    scopes:
      - provider_files
    patterns:
      - '(?s)\b(?:Future<[^>]*>|FutureOr<[^>]*>|void)\s+(?!build\b)\w+\s*\([^)]*\)\s*(?:async\s*)?\{(?:(?!\n\s*\}).){0,1600}?\bref\.watch\s*\(\s*\w+RepositoryProvider\b'
    mode: file
    tags:
      - memox
      - state-management
      - riverpod

  - id: memox.long_collection_uses_builder
    type: regex
    severity: warning
    enabled: true
    message: Long or data-driven lists and grids should use `ListView.builder` or `GridView.builder` instead of eagerly
      building children from loops or maps.
    scopes:
      - widget_ui_files
    patterns:
      - '(?s)\b(?:ListView|GridView)\s*\((?:(?!\.builder\s*\().){0,1200}?\bchildren\s*:\s*(?:<[^>]+>)?\s*\[?\s*(?:for\s*\(|\w+\.map\s*\()'
    mode: file
    tags:
      - memox
      - ui
      - performance

  - id: memox.heavy_collection_work_in_build
    type: regex
    severity: warning
    enabled: true
    message: Widget build methods should not do heavy sort/filter/grouping work directly. Move derived collections to a
      provider/viewmodel, memoized helper, or precomputed state.
    scopes:
      - widget_ui_files
    patterns:
      - '(?s)Widget\s+build\s*\(\s*BuildContext\s+context\s*\)\s*(?:=>|\{)(?:(?!\n\s*\}\n).){0,1600}?\.(?:sort|where|groupBy)\s*\('
    mode: file
    tags:
      - memox
      - ui
      - performance

  - id: memox.screen_async_value_when_section_split
    type: regex
    severity: warning
    enabled: true
    message: Large screen-level `AsyncValue.when` rendering should be split into smaller sections or wrapped by the shared
      async component instead of owning loading/error/data branches inline.
    scopes:
      - screen_like_files
    patterns:
      - '(?s)\bref\.watch\s*\([^)]+\)(?:(?!class\s).){0,1200}?\.when\s*\('
      - '(?s)\bAsyncValue<[^>]+>\s+\w+\s*;(?:(?!class\s).){0,1200}?\b\w+\.when\s*\('
    mode: file
    tags:
      - memox
      - ui
      - async

  - id: memox.presentation_raw_future_stream_builder
    type: regex
    severity: warning
    enabled: true
    message: >-
      Presentation widgets should route async rendering through Riverpod
      providers and shared async surfaces instead of raw FutureBuilder /
      StreamBuilder. Raw builders couple fetch lifecycles to widget rebuilds and
      make retained loading/error handling harder to keep consistent.
    include:
      - lib/main.dart
      - lib/app/app.dart
      - lib/presentation/features/**/*.dart
      - lib/presentation/shared/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
    patterns:
      - '\b(?:FutureBuilder|StreamBuilder)(?:<[^>]+>)?\s*\('
    tags:
      - memox
      - state-management
      - ui
      - performance
      - async

  - id: memox.watch_state_side_effect_requires_listen
    type: regex
    severity: warning
    enabled: true
    message: UI side effects driven by provider state should use `ref.listen`; do not trigger dialog or snackbar effects
      directly from state read with `ref.watch`.
    scopes:
      - widget_ui_files
    patterns:
      - '(?s)\bref\.watch\s*\([^)]+\)(?:(?!ref\.listen).){0,1200}?\b(?:showDialog|SnackBar|ScaffoldMessenger\.of)\s*\('
    mode: file
    tags:
      - memox
      - state-management
      - side-effects

  - id: memox.template_screen_shell_no_ref_watch
    type: regex
    severity: warning
    enabled: true
    message: >-
      Template-only screen shells that return `MxScaffold`, `MxListScaffold`, `MxFormScaffold`, or `MxStudyScaffold` should not
      also watch providers in the same build body. Move provider watching into a section widget, or add
      `// guard:allow-screen-watch -- reason: ...` when the screen shell must stay reactive.
    scopes:
      - screen_like_files
    patterns:
      - '(?s)Widget\s+build\s*\(\s*BuildContext\s+context\s*,\s*WidgetRef\s+ref\s*\)\s*\{(?![\s\S]{0,1600}guard:allow-screen-watch\s+--\s+reason:\s*\S)[\s\S]{0,1600}?\bref\.watch\s*\([^)]+\)[\s\S]{0,1600}?\breturn\s+(?:const\s+)?Mx(?:Scaffold|ListScaffold|FormScaffold|StudyScaffold)\s*\('
    mode: file
    tags:
      - memox
      - state-management
      - ui-shell

  - id: memox.screen_watch_escape_hatch_requires_reason
    type: regex
    severity: error
    enabled: true
    message: >-
      `guard:allow-screen-watch` must include `-- reason: ...` so template-shell provider watches stay reviewed.
    scopes:
      - screen_like_files
    patterns:
      - 'guard:allow-screen-watch(?!\s+--\s+reason:\s*\S)'
    tags:
      - memox
      - state-management
      - ui-shell

  - id: memox.action_error_extraction_via_helper
    type: regex
    severity: error
    enabled: true
    message: >-
      Extract `AppFailure` from action `AsyncValue<void>` via `MxActionErrors.failureOf(...)`
      from `lib/presentation/shared/viewmodels/mx_action_errors.dart`. Do not hand-roll
      `.whenOrNull(error: (error, _) => error is AppFailure ? error : null)`.
    include:
      - lib/presentation/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/presentation/shared/viewmodels/mx_action_errors.dart
    patterns:
      - error\s+is\s+AppFailure\s*\?\s*error\s*:\s*null
    tags:
      - memox
      - state-management
      - error-handling

  - id: memox.action_error_message_via_helper
    type: regex
    severity: error
    enabled: true
    message: >-
      Map `AppFailure` to a user-facing string via `MxActionErrors.messageOf(...)`
      from `lib/presentation/shared/viewmodels/mx_action_errors.dart`. Do not re-implement
      the `failure.cause case final ValidationException` ladder per feature.
    include:
      - lib/presentation/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/presentation/shared/viewmodels/mx_action_errors.dart
    patterns:
      - failure\.cause\s+case\s+final\s+ValidationException
    tags:
      - memox
      - state-management
      - error-handling

  - id: memox.async_draft_current_value_via_helper
    type: regex
    severity: error
    enabled: true
    message: >-
      Read the current draft from an `AsyncValue<T>` via the `MxAsyncDraft.currentValue`
      extension from `lib/presentation/shared/viewmodels/mx_async_draft.dart`. Do not
      inline the `AsyncData(:final value) => value, _ => null` switch in viewmodels.
    include:
      - lib/presentation/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
      - lib/presentation/shared/viewmodels/mx_async_draft.dart
    patterns:
      - AsyncData\(\s*:\s*final\s+value\s*\)\s*=>\s*value\s*,\s*_\s*=>\s*null
    tags:
      - memox
      - state-management
      - form-draft
