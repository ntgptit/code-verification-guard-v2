version: 1
metadata:
  id: memox-coding
  name: MemoX Coding Rules
  description: MemoX coding convention rules ported from the legacy guard policy.
  owner: code-verification-guard
rules:
  - id: memox.provider_file_naming
    type: file_name
    severity: error
    enabled: true
    message: Provider-owned files should use a clear suffix such as `*_provider.dart`, `*_providers.dart`, `*_notifier.dart`,
      or `*_viewmodel.dart`, and should avoid vague stems such as `common` or `main`.
    include:
      - lib/app/di/**/*.dart
      - lib/presentation/features/*/providers/*.dart
      - lib/presentation/features/*/viewmodels/*.dart
    pattern: ^(?!(?:common|main|shared|base|misc|helper|util|temp)(?:_|$))(?:[a-z0-9]+(?:_[a-z0-9]+)*)_(?:provider|providers|notifier|notifiers|viewmodel)\.dart$|^(?:app_)?providers\.dart$
    tags:
      - memox
      - coding
      - style
  - id: memox.crud_screen_class_naming
    type: regex
    severity: error
    enabled: true
    message: CRUD/entity screen classes must name the entity, surface, and `Screen` suffix explicitly, for example `DeckImportScreen`,
      `FlashcardEditorScreen`, `FlashcardListScreen`, or `FolderDetailScreen`.
    include:
      - lib/presentation/features/*/screens/*_screen.dart
      - lib/presentation/features/**/screens/**/*_screen.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
    patterns:
      - '(?m)^\s*class\s+(?!(?:Deck|Decks|Folder|Folders|Subfolder|Subfolders|Flashcard|Flashcards|Tag|Tags)(?:List|Detail|Editor|Import|Action|MovePicker)Screen\b)(?:Deck|Decks|Folder|Folders|Subfolder|Subfolders|Flashcard|Flashcards|Tag|Tags)\w*(?:View|Page|Screen|Details)\b'
    tags:
      - memox
      - coding
      - architecture
      - naming
      - crud
  - id: memox.crud_viewmodel_controller_naming
    type: regex
    severity: error
    enabled: true
    message: CRUD/entity controller classes must use `{Entity}{Surface}Controller` or `{Entity}ActionController` so the owning
      object and workflow are obvious from the class name.
    include:
      - lib/presentation/features/**/viewmodels/*_viewmodel.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
    patterns:
      - '(?m)^\s*class\s+(?!(?:Deck|Decks|Folder|Folders|Subfolder|Subfolders|Flashcard|Flashcards|Tag|Tags)(?:List|Detail|Editor|Import|Action|MovePicker)Controller\b)(?:Deck|Decks|Folder|Folders|Subfolder|Subfolders|Flashcard|Flashcards|Tag|Tags)\w*Controller\b'
    tags:
      - memox
      - coding
      - architecture
      - naming
      - crud
  - id: memox.crud_command_method_names_include_entity
    type: regex
    severity: error
    enabled: true
    message: CRUD command methods in presentation viewmodels must include the affected object in the method name, for example
      `createDeck`, `updateFolder`, `deleteFlashcards`, `moveDeck`, or `reorderSubfolders`.
    include:
      - lib/presentation/features/**/viewmodels/*_viewmodel.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
    patterns:
      - '(?m)^\s*(?:Future<[^>]+>|Future<void>|void)\s+(?!(?:create|update|delete|move|duplicate|reorder|save)(?:Deck|Decks|Folder|Folders|Subfolder|Subfolders|Flashcard|Flashcards|Tag|Tags)\b)(?:create|update|delete|move|duplicate|reorder|save)\w*\s*\('
    tags:
      - memox
      - coding
      - architecture
      - naming
      - crud
  - id: memox.flutter_class_name_max_length
    type: regex
    severity: warning
    enabled: true
    message: Flutter class names must be between 10 and 35 characters.
    scopes:
      - app_and_presentation_source
    patterns:
      - '(?m)^\s*(?:(?:abstract|base|final|interface|sealed|mixin)\s+)*class\s+(?!Mx[A-Za-z0-9_]*\b)[A-Za-z_][A-Za-z0-9_]{0,8}\b'
      - '(?m)^\s*(?:(?:abstract|base|final|interface|sealed|mixin)\s+)*class\s+(?!Mx[A-Za-z0-9_]*\b)[A-Za-z_][A-Za-z0-9_]{35,}\b'
    tags:
      - memox
      - coding
      - naming
    fix:
      hint: Keep the class name between 10 and 35 characters.
  - id: memox.flutter_local_variable_name_length
    type: regex
    severity: warning
    enabled: true
    message: Local variable names must be between 3 and 18 characters.
    scopes:
      - app_and_presentation_source
    patterns:
      - '(?m)^\s{4,}(?:static\s+)?(?:late\s+)?(?:final|const|var)\s+(?!bool\b)[A-Za-z_][A-Za-z0-9_]{0,1}\b(?=\s*(?:=|;|:))'
      - '(?m)^\s{4,}(?:static\s+)?(?:late\s+)?(?:final|const|var)\s+(?!bool\b)[A-Za-z_][A-Za-z0-9_]{18,}\b(?=\s*(?:=|;|:))'
      - '(?m)^\s{4,}(?:static\s+)?(?:[A-Z][A-Za-z0-9_<>,?.]*|(?:String|int|double|num|dynamic|Object|Never|void|List|Map|Set|Future|Stream|Iterable|ValueChanged|WidgetBuilder|EdgeInsetsGeometry|PreferredSizeWidget|MainAxisAlignment|CrossAxisAlignment|AnimationController|TextEditingController|Color)(?:<[^>]+>)?)\s+[A-Za-z_][A-Za-z0-9_]{0,1}\b(?=\s*(?:=|;|:))'
      - '(?m)^\s{4,}(?:static\s+)?(?:[A-Z][A-Za-z0-9_<>,?.]*|(?:String|int|double|num|dynamic|Object|Never|void|List|Map|Set|Future|Stream|Iterable|ValueChanged|WidgetBuilder|EdgeInsetsGeometry|PreferredSizeWidget|MainAxisAlignment|CrossAxisAlignment|AnimationController|TextEditingController|Color)(?:<[^>]+>)?)\s+[A-Za-z_][A-Za-z0-9_]{18,}\b(?=\s*(?:=|;|:))'
    tags:
      - memox
      - coding
      - naming
    fix:
      hint: Keep the local variable name between 3 and 18 characters.
  - id: memox.flutter_model_state_field_name_length
    type: regex
    mode: file
    severity: warning
    enabled: true
    message: Model and State field names must be between 3 and 22 characters.
    scopes:
      - app_and_presentation_source
    patterns:
      - '(?ms)^\s*class\s+[A-Za-z_][A-Za-z0-9_]*(?:Model|State)\b.*?^\s{2,}(?:static\s+)?(?:late\s+)?(?:final|const|var)\s+(?!bool\b)[A-Za-z_][A-Za-z0-9_]{0,1}\b(?=\s*(?:=|;|,|:))'
      - '(?ms)^\s*class\s+[A-Za-z_][A-Za-z0-9_]*(?:Model|State)\b.*?^\s{2,}(?:static\s+)?(?:late\s+)?(?:final|const|var)\s+(?!bool\b)[A-Za-z_][A-Za-z0-9_]{22,}\b(?=\s*(?:=|;|,|:))'
      - '(?ms)^\s*class\s+[A-Za-z_][A-Za-z0-9_]*(?:Model|State)\b.*?^\s{2,}(?:static\s+)?(?:[A-Z][A-Za-z0-9_<>,?.]*|(?:String|int|double|num|dynamic|Object|Never|void|List|Map|Set|Future|Stream|Iterable|ValueChanged|WidgetBuilder|EdgeInsetsGeometry|PreferredSizeWidget|MainAxisAlignment|CrossAxisAlignment|AnimationController|TextEditingController|Color)(?:<[^>]+>)?)\s+[A-Za-z_][A-Za-z0-9_]{0,1}\b(?=\s*(?:=|;|,|:))'
      - '(?ms)^\s*class\s+[A-Za-z_][A-Za-z0-9_]*(?:Model|State)\b.*?^\s{2,}(?:static\s+)?(?:[A-Z][A-Za-z0-9_<>,?.]*|(?:String|int|double|num|dynamic|Object|Never|void|List|Map|Set|Future|Stream|Iterable|ValueChanged|WidgetBuilder|EdgeInsetsGeometry|PreferredSizeWidget|MainAxisAlignment|CrossAxisAlignment|AnimationController|TextEditingController|Color)(?:<[^>]+>)?)\s+[A-Za-z_][A-Za-z0-9_]{22,}\b(?=\s*(?:=|;|,|:))'
    tags:
      - memox
      - coding
      - naming
    fix:
      hint: Keep the field name between 3 and 22 characters.
  - id: memox.flutter_boolean_name_length
    type: regex
    severity: warning
    enabled: true
    message: Boolean variable and field names must be between 5 and 25 characters.
    scopes:
      - app_and_presentation_source
    patterns:
      - '(?m)^\s{2,}(?:static\s+)?(?:late\s+)?bool\s+[A-Za-z_][A-Za-z0-9_]{0,4}\b(?=\s*(?:=|;|:))'
      - '(?m)^\s{2,}(?:static\s+)?(?:late\s+)?bool\s+[A-Za-z_][A-Za-z0-9_]{25,}\b(?=\s*(?:=|;|:))'
      - '(?m)^\s{4,}(?:static\s+)?(?:late\s+)?bool\s+[A-Za-z_][A-Za-z0-9_]{0,4}\b(?=\s*(?:=|;|:))'
      - '(?m)^\s{4,}(?:static\s+)?(?:late\s+)?bool\s+[A-Za-z_][A-Za-z0-9_]{25,}\b(?=\s*(?:=|;|:))'
      - '(?m)^\s{2,}(?:static\s+)?(?:late\s+)?(?:final|const|var)\s+[A-Za-z_][A-Za-z0-9_]{0,4}\b(?=\s*=\s*(?:true|false)\b)'
      - '(?m)^\s{2,}(?:static\s+)?(?:late\s+)?(?:final|const|var)\s+[A-Za-z_][A-Za-z0-9_]{25,}\b(?=\s*=\s*(?:true|false)\b)'
      - '(?m)^\s{4,}(?:static\s+)?(?:late\s+)?(?:final|const|var)\s+[A-Za-z_][A-Za-z0-9_]{0,4}\b(?=\s*=\s*(?:true|false)\b)'
      - '(?m)^\s{4,}(?:static\s+)?(?:late\s+)?(?:final|const|var)\s+[A-Za-z_][A-Za-z0-9_]{25,}\b(?=\s*=\s*(?:true|false)\b)'
    tags:
      - memox
      - coding
      - naming
    fix:
      hint: Keep the boolean name between 5 and 25 characters.
  - id: memox.guard_centralized_constants
    type: regex
    severity: error
    enabled: true
    message: Guard Python sources must not hardcode shared guard contract literals; move them into `tools/guard/engine/constants.py`
      and import the constant instead.
    scopes:
      - guard_python_non_constants
    patterns:
      - '["'']config\.yaml["'']'
      - '["'']messages\.yaml["'']'
      - '["'']suppressions\.yaml["'']'
      - '["'']baseline\.json["'']'
      - '["'']utf-8["'']'
      - '["'']terminal["'']'
      - '["'']json["'']'
      - '["'']markdown["'']'
      - '["'']PASS["'']'
      - '["'']FAIL["'']'
      - '["'']enabled["'']'
      - '["'']disabled["'']'
      - '["'']rules["'']'
      - '["'']violations_preview["'']'
    tags:
      - memox
      - coding
      - architecture
  - id: memox.async_refetch_blanks_screen
    type: regex
    severity: error
    enabled: true
    message: 'Screen-level widgets must not blank the whole UI every time a watched provider refetches because of search,
      sort, or revision-driven query changes. Do not use `AsyncValue.when(loading: () => MxLoadingState...)` directly on these
      screen surfaces. Preserve previous data during refetch and reserve `MxLoadingState` for first-load only.

      '
    scopes:
      - screen_like_files
    patterns:
      - loading:\s*\(\)\s*=>\s*const\s+MxLoadingState
      - loading:\s*\(\)\s*=>\s*MxLoadingState\(
    tags:
      - memox
      - coding
      - performance
  - id: memox.feature_query_provider_keep_alive
    type: regex
    severity: error
    enabled: true
    message: 'Feature read-model query providers that return `Future<...State>`, `Future<...ReadModel>`, `Future<...Query>`,
      or the stream equivalents must opt into a deliberate lifecycle with `@Riverpod(keepAlive: true)` or an explicit `ref.keepAlive()`
      strategy. Plain `@riverpod` autoDispose on these providers causes push/pop refetch flicker on screen mount.

      '
    include:
      - lib/presentation/features/**/viewmodels/*_viewmodel.dart
    patterns:
      - '@riverpod\s*(?:\r?\n)+Future<\w+(?:ReadModel|State|Query)>'
      - '@riverpod\s*(?:\r?\n)+Stream<\w+(?:ReadModel|State|Query)>'
    mode: file
    tags:
      - memox
      - coding
      - performance
  - id: memox.shell_fab_no_route_state_coupling
    type: regex
    severity: error
    enabled: true
    message: 'App-shell floating action buttons must not toggle directly from `state.uri.path` checks. That coupling makes
      the shell rebuild and swap FAB presence across sub-routes, which shows up as navigation flicker. Keep the FAB inside
      the owning screen or animate visibility locally.

      '
    include:
      - lib/app/app_shell.dart
    patterns:
      - state\.uri\.path\s*==\s*RoutePaths\.
    tags:
      - memox
      - coding
      - architecture
  - id: memox.retained_async_state_requires_skeleton
    type: regex
    severity: warning
    enabled: true
    message: 'Push-from-list detail screens that use `MxRetainedAsyncState` must supply a `skeletonBuilder` for the first
      load. Falling back to `MxLoadingState` on these screens creates a high-contrast flash on the first route frame.

      '
    include:
      - lib/presentation/features/folders/screens/folder_detail_screen.dart
      - lib/presentation/features/decks/screens/deck_detail_screen.dart
      - lib/presentation/features/flashcards/screens/flashcard_list_screen.dart
    patterns:
      - (?s)MxRetainedAsyncState<[^>]+>\((?:(?!skeletonBuilder).)*?\)
    mode: file
    tags:
      - memox
      - coding
      - performance
  - id: memox.feature_screen_no_manual_page_gutter
    type: regex
    severity: error
    enabled: true
    message: 'Page gutter must come from `MxContentShell`, `MxScaffold`, or `AppLayout.pageInsets(...)`. Feature screens must
      not hardcode `ListView` or `SingleChildScrollView` body padding with `EdgeInsets...`, because that recreates double-gutter
      and bypasses tier-aware layout.

      '
    scopes:
      - screens
    patterns:
      - (?s)ListView\s*\((?:(?!\)).)*?padding:\s*(?:const\s+)?EdgeInsets\.
      - (?s)SingleChildScrollView\s*\((?:(?!\)).)*?padding:\s*(?:const\s+)?EdgeInsets\.
    mode: file
    tags:
      - memox
      - coding
      - architecture
  - id: memox.feature_screen_uses_mx_screen_shell
    type: regex
    severity: warning
    enabled: true
    message: >-
      Feature screens that directly return a top-level shell should use `MxScaffold`, `MxListScaffold`, `MxFormScaffold`,
      or `MxStudyScaffold`. Keep provider watching and business state in smaller section widgets.
    scopes:
      - screen_like_files
    patterns:
      - '(?s)\bclass\s+\w+(?:Screen|Page)\s+extends\s+(?:ConsumerWidget|ConsumerStatefulWidget|StatelessWidget|StatefulWidget)\s*\{(?:(?!\bclass\s).){0,1800}?\bWidget\s+build\s*\([^)]*\)\s*(?:=>\s*(?:const\s+)?(?!Mx(?:Scaffold|ListScaffold|FormScaffold|StudyScaffold)\s*\()[A-Z]\w+\s*\(|\{\s*(?:(?:final|const|var)\s+[^;]+;\s*){0,8}return\s+(?:const\s+)?(?!Mx(?:Scaffold|ListScaffold|FormScaffold|StudyScaffold)\s*\()[A-Z]\w+\s*\()'
    mode: file
    tags:
      - memox
      - coding
      - architecture
      - ui-shell
  - id: memox.feature_screen_no_raw_padding_radius_color
    type: regex
    severity: error
    enabled: true
    message: >-
      Feature screens must not use raw numeric literals in `EdgeInsets`, `BorderRadius`, or `Radius` constructors.
      Prefer `MxSpace`, `MxGap`, `AppLayout` / `LayoutContext`, or shared layout tokens. Token-only constructor calls
      such as `EdgeInsets.symmetric(vertical: MxSpace.xs)` are allowed. Add `guard:layout-value-reviewed` only for
      reviewed raw-number exceptions. Route colors through `ColorScheme` / theme extensions, not `Color(...)` or `Colors.*`.
    scopes:
      - screen_like_files
    patterns:
      - '(?m)\b(?:EdgeInsets|BorderRadius|Radius)\.(?![^\n]*guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?![^\n]*\n\s*// guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?=[^\n;]*(?:\(\s*\d+|\b\d+(?:\.\d+)?\s*[,)]|:\s*\d+(?:\.\d+)?(?:\s*[,)]|\s*$)))'
      - '(?m)\b(?:Color\s*\(|Color\.from|Colors\.)(?![^\n]*guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?![^\n]*\n\s*// guard:layout-value-reviewed\s+--\s+reason:\s*\S)'
    mode: file
    tags:
      - memox
      - coding
      - architecture
      - design_system
  - id: memox.base_screen_no_hardcoded_layout_values
    type: regex
    severity: warning
    enabled: true
    message: >-
      Base screen templates should use layout/theme tokens for padding, radius, and color. Raw numeric literals in
      `EdgeInsets`, `BorderRadius`, or `Radius` require `guard:layout-value-reviewed -- reason: ...` on the same line or
      the line immediately after. Token-only constructor calls are allowed without the marker.
    include:
      - lib/presentation/shared/layouts/mx_*scaffold.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
    patterns:
      - '(?m)\b(?:EdgeInsets|BorderRadius|Radius)\.(?![^\n]*guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?![^\n]*\n\s*// guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?=[^\n;]*(?:\(\s*\d+|\b\d+(?:\.\d+)?\s*[,)]|:\s*\d+(?:\.\d+)?(?:\s*[,)]|\s*$)))'
      - '(?m)\b(?:Color\s*\(|Color\.from|Colors\.)(?![^\n]*guard:layout-value-reviewed\s+--\s+reason:\s*\S)(?![^\n]*\n\s*// guard:layout-value-reviewed\s+--\s+reason:\s*\S)'
    mode: file
    tags:
      - memox
      - coding
      - architecture
      - design_system
  - id: memox.mx_gap_horizontal_constructor_forbidden
    type: regex
    severity: error
    enabled: true
    message: '`MxGap.h(...)` was removed when MemoX migrated to the axis-aware `gap` wrapper. Use `MxGap(...)` everywhere
      so spacing follows the parent axis automatically.

      '
    include:
      - lib/**/*.dart
      - test/**/*.dart
    patterns:
      - \bMxGap\.h\s*\(
    tags:
      - memox
      - coding
      - architecture
  - id: memox.app_string_normalization_uses_string_utils
    type: regex
    severity: error
    enabled: true
    message: 'App source must route runtime string trimming, case normalization, matching, and sorting through `StringUtils`
      instead of calling core string normalization methods directly. Centralizing this keeps search, comparison, and answer
      matching semantics consistent across app layers.

      '
    include:
      - lib/**/*.dart
    exclude:
      - lib/core/utils/string_utils.dart
      - lib/data/datasources/local/tables/*.dart
    patterns:
      - \.trim\s*\(
      - \.toLowerCase\s*\(
      - \.toUpperCase\s*\(
    tags:
      - memox
      - coding
      - architecture

  - id: memox.test_file_lines
    type: max_lines
    severity: warning
    enabled: true
    message: Test file is too large. Consider splitting by feature event boundary, Decision Table section, or reusable fixture boundary.
    include:
      - test/**/*.dart
      - integration_test/**/*.dart
    exclude:
      - "**/*.g.dart"
      - "**/*.freezed.dart"
    max_lines: 1600
    count_mode: logical
    tags:
      - memox
      - coding
      - tests
      - decision-table
    fix:
      hint: Split large tests by event boundary or Decision Table case group while keeping row names aligned with the markdown Decision Table.

  - id: test.no_skip_without_reason
    type: regex
    severity: error
    enabled: true
    message: >-
      `skip: true` in a test or group must not be used without a documented reason.
      A skipped test with no context silently hides regressions. Use
      `skip: 'reason: ...'` (a non-empty string) so reviewers understand why the
      test is disabled and when it can be re-enabled.
    include:
      - test/**/*.dart
      - integration_test/**/*.dart
    exclude:
      - '**/*.g.dart'
      - '**/*.freezed.dart'
    patterns:
      - '\bskip\s*:\s*true\b'
    tags:
      - memox
      - coding
      - tests
    fix:
      hint: "Change `skip: true` to `skip: 'reason: <explanation>'` or remove the skip and fix the test."

  - id: comment.no_stale_todo_without_ticket
    type: regex
    severity: warning
    enabled: true
    message: >-
      `TODO`, `FIXME`, and `HACK` comments must include a ticket id (e.g. `MEMOX-123`,
      `#123`) or an explicit reason (`-- reason: ...`) so the intent is traceable.
      Uncommented markers become invisible tech debt. Complements
      `common.no_todo_without_ticket` and extends coverage to `HACK`.
    scopes:
      - source_files
    patterns:
      - '\b(TODO|FIXME|HACK)\b(?!.*([A-Z]+-[0-9]+|#[0-9]+|--\s*reason\s*:))'
    tags:
      - memox
      - coding
      - maintainability
    fix:
      hint: "Add a ticket reference (MEMOX-123 / #123) or `-- reason: <why>` on the same line."
