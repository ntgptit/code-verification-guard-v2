version: 1

metadata:
  id: memox-ui
  name: MemoX UI Rules
  description: Project-specific UI rules for MemoX.
  owner: code-verification-guard

rules:
  - id: memox.no_raw_card
    type: regex
    severity: error
    enabled: true
    message: MemoX must not use Card directly. Use MxCard or a more specific shared surface.
    scopes:
      - flutter_source
    exclude:
      - "lib/presentation/shared/**"
    patterns:
      - "\\bCard\\s*\\("
    tags:
      - memox
      - ui
      - design-system
    fix:
      hint: Replace raw Card usage with MxCard or a more specific shared surface.

  - id: memox.no_async_value_when
    type: regex
    severity: error
    enabled: true
    message: MemoX must not use AsyncValue.when directly. Use AppAsyncBuilder.
    scopes:
      - flutter_source
    exclude:
      - "lib/presentation/shared/**"
    patterns:
      - "\\.when\\s*\\("
    tags:
      - memox
      - ui
      - state
    fix:
      hint: Wrap AsyncValue rendering with AppAsyncBuilder.

  - id: memox.shared_widget_build_lines
    type: max_build_lines
    severity: warning
    enabled: true
    message: Shared widget build() is too long. Split visual states into private helpers while preserving the public shared widget API.
    include:
      - lib/presentation/shared/**/*.dart
    exclude:
      - "**/*.g.dart"
      - "**/*.freezed.dart"
    max_lines: 140
    count_mode: logical
    tags:
      - memox
      - ui
      - maintainability
      - shared-widget
    fix:
      hint: Extract private build helpers or smaller internal widgets without widening the shared widget public API.

  - id: memox.flashcard_editor_widgets_no_part_of
    type: regex
    severity: error
    enabled: true
    message: Flashcard editor widgets must stay as standalone Dart libraries; do not split them with `part of` directives.
    include:
      - lib/presentation/features/flashcards/widgets/flashcard_editor_view*.dart
    exclude:
      - "**/*.g.dart"
      - "**/*.freezed.dart"
    patterns:
      - "^\\s*part\\s+of\\s+['\\\"][^'\\\"]+['\\\"];?$"
    tags:
      - memox
      - ui
      - architecture
      - maintainability

  - id: memox.no_hardcoded_animation_duration
    type: regex
    severity: error
    enabled: true
    message: >-
      Presentation code must source animation / transition durations from
      `AppMotion.*` in `lib/core/theme/tokens/app_motion.dart`. Hardcoded
      `Duration(milliseconds: N)` / `Duration(seconds: N)` literals scatter
      motion language and cannot be retuned centrally.
    include:
      - lib/presentation/**/*.dart
    exclude:
      - "**/*.g.dart"
      - "**/*.freezed.dart"
    patterns:
      - 'Duration\s*\(\s*(?:milliseconds|seconds|minutes)\s*:\s*\d'
    tags:
      - memox
      - ui
      - motion
      - performance

  - id: memox.image_network_requires_cache
    type: regex
    severity: warning
    enabled: true
    message: >-
      Raw `Image.network(...)` / `NetworkImage(...)` re-downloads the bytes on
      every rebuild and on scroll. Route remote images through a cached image
      primitive (e.g. `cached_network_image`) or wrap with `precacheImage`. Add
      this exception via a file-level exclude only after the wrapper exists.
    include:
      - lib/presentation/**/*.dart
    exclude:
      - "**/*.g.dart"
      - "**/*.freezed.dart"
    patterns:
      - '\bImage\.network\s*\('
      - '\bNetworkImage\s*\('
    tags:
      - memox
      - ui
      - performance
      - images

  - id: memox.intrinsic_layout_requires_review
    type: regex
    severity: warning
    enabled: true
    message: >-
      IntrinsicHeight / IntrinsicWidth can force extra layout passes and show up
      as frame jank on dense Flutter surfaces. Prefer fixed constraints,
      LayoutBuilder, shared layout primitives, or a reviewed exception when the
      intrinsic measurement is intentionally bounded.
    include:
      - lib/main.dart
      - lib/app/app.dart
      - lib/presentation/features/**/*.dart
      - lib/presentation/shared/**/*.dart
    exclude:
      - "**/*.g.dart"
      - "**/*.freezed.dart"
    patterns:
      - '\bIntrinsic(?:Height|Width)\s*\('
    tags:
      - memox
      - ui
      - performance
      - layout

  - id: memox.scrollable_shrinkwrap_requires_review
    type: regex
    severity: warning
    enabled: true
    message: >-
      `shrinkWrap: true` on scrollables asks Flutter to measure children instead
      of using the viewport constraint. Prefer bounded layout, slivers, or
      builder-based composition; keep shrinkWrap only for small, reviewed
      surfaces.
    include:
      - lib/main.dart
      - lib/app/app.dart
      - lib/presentation/features/**/*.dart
      - lib/presentation/shared/**/*.dart
    exclude:
      - "**/*.g.dart"
      - "**/*.freezed.dart"
    patterns:
      - '\bshrinkWrap\s*:\s*true\b'
    tags:
      - memox
      - ui
      - performance
      - layout
