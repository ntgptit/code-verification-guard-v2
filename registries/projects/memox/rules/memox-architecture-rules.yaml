version: 1
metadata:
  id: memox-architecture
  name: MemoX Architecture Rules
  description: Layering, dependency-direction, DI wiring, and data-boundary rules for MemoX.
  owner: code-verification-guard
rules:
  - id: memox.transaction_outside_data_layer
    type: regex
    severity: error
    enabled: true
    message: Database transactions must stay in the data or database layer; do not call `transaction(...)` from UI, app providers,
      presentation notifiers, services, or use cases.
    scopes:
      - non_data_layer_source
    patterns:
      - \btransaction\s*\(
    tags:
      - memox
      - architecture
  - id: memox.widget_repository_provider_access
    type: regex
    severity: error
    enabled: true
    message: Widget files must not read or watch repository providers directly.
    scopes:
      - widget_ui_files
    patterns:
      - ref\.(?:read|watch)\s*\(\s*\w*RepositoryProvider(?:\b|\s*[.)])
    tags:
      - memox
      - architecture
  - id: memox.widget_database_layer_import
    type: regex
    severity: error
    enabled: true
    message: Widget files must not import DAO or database files directly.
    scopes:
      - widget_ui_files
    patterns:
      - ^import\s+'package:memox/core/database/[^']+\.dart';
      - ^import\s+'package:memox/data/dao/[^']+\.dart';
      - ^import\s+'(?:\.\./)+[^']*/(?:dao|database)/[^']+\.dart';
    tags:
      - memox
      - architecture
  - id: memox.widget_database_query_usage
    type: regex
    severity: error
    enabled: true
    message: Widget files must not query Drift or call DAO objects directly.
    scopes:
      - widget_ui_files
    patterns:
      - \b(?:_?database|db|appDatabase)\s*\.\s*(?:select|into|customSelect|customSelectStream)\s*\(
      - \b(?:_?[A-Za-z0-9]*Dao)\s*\.\s*[A-Za-z_][A-Za-z0-9_]*\s*\(
    tags:
      - memox
      - architecture
  - id: memox.domain_no_flutter_import
    type: forbidden_import
    severity: error
    enabled: true
    message: The domain layer must not import Flutter packages.
    include:
      - lib/domain/**/*.dart
    patterns:
      - package:flutter/
    tags:
      - memox
      - architecture
    fix:
      hint: Keep domain code framework-independent.
  - id: memox.domain_no_data_import
    type: forbidden_import
    severity: error
    enabled: true
    message: The domain layer must not import the data layer.
    include:
      - lib/domain/**/*.dart
    patterns:
      - package:memox/data/
      - (?:\.\./)+data/
    tags:
      - memox
      - architecture
    fix:
      hint: Depend on domain abstractions instead of data implementations.
  - id: memox.domain_no_presentation_import
    type: forbidden_import
    severity: error
    enabled: true
    message: The domain layer must not import the presentation layer.
    include:
      - lib/domain/**/*.dart
    patterns:
      - package:memox/presentation/
      - (?:\.\./)+presentation/
    tags:
      - memox
      - architecture
    fix:
      hint: Move shared contracts into the domain layer.
  - id: memox.presentation_no_data_import
    type: forbidden_import
    severity: error
    enabled: true
    message: The presentation layer must not import the data layer directly.
    include:
      - lib/presentation/**/*.dart
    patterns:
      - package:memox/data/
      - (?:\.\./)+data/
    tags:
      - memox
      - architecture
    fix:
      hint: Access data through application services or use cases.
  - id: memox.domain_no_flutter_foundation_import
    type: regex
    severity: error
    enabled: true
    message: Domain entities and services must stay pure Dart and must not import Flutter framework annotations.
    scopes:
      - domain_files
    patterns:
      - import\s+'package:flutter/foundation\.dart'
    tags:
      - memox
      - architecture
  - id: memox.presentation_no_dart_io_imports
    type: regex
    severity: error
    enabled: true
    message: Feature screens and widgets must not read files or platform IO directly; route platform access through core/data
      helpers.
    scopes:
      - feature_ui
    patterns:
      - import\s+'dart:io
    tags:
      - memox
      - architecture
  - id: memox.presentation_no_broad_dart_ui_imports
    type: regex
    severity: error
    enabled: true
    message: Presentation code that needs low-level engine APIs must import only the explicit symbols it uses.
    scopes:
      - ui
    patterns:
      - import\s+'dart:ui';
    tags:
      - memox
      - architecture
  - id: memox.study_session_widgets_no_progress_formula
    type: regex
    severity: error
    enabled: true
    message: Study session widgets should bind display-ready progress values from domain helpers instead of recalculating
      progress and percent in build methods.
    scopes:
      - study_session_widget_files
    patterns:
      - \boverallStudyProgress\s*\(
      - \blocalCorrectGradeCount\s*\(
    tags:
      - memox
      - architecture
  - id: memox.cross_feature_study_provider_imports
    type: regex
    severity: error
    enabled: true
    message: Non-study presentation features must not import Study feature providers directly; expose shared revision or settings
      boundaries outside the feature.
    scopes:
      - features
    patterns:
      - import\s+'(?:\.\./)+study/providers/
      - import\s+'(?:\.\./)+app/di/study/study_revision_providers\.dart'
      - import\s+'package:memox/presentation/features/study/providers/
      - import\s+'package:memox/app/di/study/study_revision_providers\.dart'
    tags:
      - memox
      - architecture
  - id: memox.centralized_shared_preferences_provider
    type: regex
    severity: error
    enabled: true
    message: Only the app-level DI provider may call `SharedPreferences.getInstance()`; feature DI must reuse `sharedPreferencesProvider`.
    scopes:
      - core_di
    patterns:
      - SharedPreferences\.getInstance\s*\(
    exclude:
      - lib/app/di/providers.dart
      - providers.dart
    tags:
      - memox
      - architecture
  - id: memox.core_di_no_ui_imports
    type: regex
    severity: error
    enabled: true
    message: '`lib/app/di/*` should wire infrastructure only and must not depend on presentation modules.'
    scopes:
      - core_di
    patterns:
      - import\s+'package:memox/presentation/
    tags:
      - memox
      - architecture
  - id: memox.core_di_no_state_notifiers
    type: regex
    severity: error
    enabled: true
    message: '`lib/app/di/*` must not define feature state or generated Riverpod notifier classes.'
    scopes:
      - core_di
    patterns:
      - class\s+\w+\s+extends\s+_\$\w+
    tags:
      - memox
      - architecture
  - id: memox.ui_direct_dependency_creation
    type: regex
    severity: error
    enabled: true
    message: Widget, app layout, notifier, and viewmodel files must not instantiate infrastructure dependencies directly;
      wire them through provider injection.
    scopes:
      - widget_ui_files
      - viewmodel_files
    patterns:
      - \bDio\s*\(
      - \b(?:http\.)?Client\s*\(
      - \b[A-Z]\w*RepositoryImpl\s*\(
      - \b[A-Z]\w*Database\s*\(
      - SharedPreferences\.getInstance\s*\(
    tags:
      - memox
      - architecture
  - id: memox.feature_provider_direct_infrastructure_access
    type: regex
    severity: error
    enabled: true
    message: Feature provider/viewmodel files must not talk directly to repository, storage, reminder, device-settings, daily-task-checker,
      or event-bus providers. Route those dependencies through a use case or facade boundary.
    scopes:
      - viewmodel_files
    patterns:
      - ref\.(?:read|watch)\s*\(\s*\w+RepositoryProvider\b
      - ref\.(?:read|watch)\s*\(\s*(?:storageServiceProvider|reminderServiceProvider|deviceSettingsServiceProvider|dailyTaskCheckerProvider|eventBusProvider)\b
    tags:
      - memox
      - architecture
  - id: memox.tts_controller_uses_playback_policy
    type: regex
    severity: error
    enabled: true
    message: TTS presentation controllers must not hardcode which flashcard side can be spoken; route that business rule through
      `TtsPlaybackPolicy`.
    include:
      - lib/presentation/features/tts/providers/tts_controller_notifier.dart
    patterns:
      - if\s*\([^\)]*TtsTextSide\.front
      - side\s*!=\s*TtsTextSide\.front
    tags:
      - memox
      - architecture
  - id: memox.di_provider_export_wrappers
    type: regex
    severity: error
    enabled: true
    message: Provider-owned files under `lib/app/di/**` must contain concrete provider wiring, not export-wrapper shortcuts.
    include:
      - lib/app/di/**/*_providers.dart
    patterns:
      - ^export\s+
    tags:
      - memox
      - architecture
  - id: memox.drift_database_must_run_off_main_isolate
    type: regex
    severity: error
    enabled: true
    message: '`AppDatabase` must keep its `QueryExecutor` off the main isolate on native platforms and configured explicitly
      for web. Use the `driftDatabase(...)` factory from `drift_flutter` with `native: DriftNativeOptions(...)` and, when
      web is supported, `web: DriftWebOptions(...)`; alternatively use `NativeDatabase.createInBackground(...)` for native-only
      code. Constructing `NativeDatabase(...)` synchronously runs every query on the UI isolate and blocks frames during large
      reads/writes.'
    include:
      - lib/data/datasources/local/**/*.dart
    exclude:
      - '**/*.g.dart'
    patterns:
      - \bNativeDatabase\s*\(
    tags:
      - memox
      - architecture
      - performance
      - drift
  - id: architecture.no_ui_import_data_layer_directly
    type: forbidden_import
    severity: error
    enabled: true
    message: Presentation and feature UI files must not import Drift, raw DAOs, or datasource implementation packages directly.
      Access persistence through provider/use-case/repository abstractions so the data layer stays swappable and domain boundaries
      remain enforced.
    include:
      - lib/presentation/**/*.dart
      - lib/app/**/*.dart
    exclude:
      - lib/app/di/**/*.dart
      - '**/*.g.dart'
      - '**/*.freezed.dart'
    patterns:
      - package:drift/drift.dart
      - package:drift/native.dart
      - package:drift_flutter/
      - package:memox/data/datasources/
      - package:memox/data/repositories/
    tags:
      - memox
      - architecture
      - drift
    fix:
      hint: Route database access through a use case or repository interface injected via Riverpod. Never import Drift or
        DAO classes directly in presentation code.
  - id: drift.no_raw_sql_in_ui_or_viewmodel
    type: regex
    severity: error
    enabled: true
    message: Raw SQL query strings (`SELECT`, `INSERT INTO`, `UPDATE … SET`, `DELETE FROM`) must not appear outside the database/DAO/query
      layer. UI and viewmodel code must never embed SQL; move queries into Drift table definitions or DAO custom queries.
    scopes:
      - non_data_layer_source
    patterns:
      - '[''"]\s*(?:SELECT|INSERT\s+INTO|UPDATE\s+\w|DELETE\s+FROM|CREATE\s+TABLE|DROP\s+TABLE)'
    tags:
      - memox
      - architecture
      - drift
    fix:
      hint: Move the SQL into a Drift DAO method or a `.drift` query file. Reference the DAO through the repository abstraction.
