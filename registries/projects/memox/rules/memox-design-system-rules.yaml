version: 1
metadata:
  id: memox-design-system
  name: MemoX Design System Rules
  description: Shared Mx components over raw Material widgets; theme-driven colors and typography.
  owner: code-verification-guard
rules:
  - id: memox.mx_gap_horizontal_constructor_forbidden
    type: regex
    severity: error
    enabled: true
    message: '`MxGap.h(...)` was removed when MemoX migrated to the axis-aware `gap` wrapper. Use `MxGap(...)` everywhere
      so spacing follows the parent axis automatically.

      '
    include:
      - lib/**/*.dart
      - test/**/*.dart
    patterns:
      - \bMxGap\.h\s*\(
    tags:
      - memox
      - design-system
      - coding
      - architecture
  - id: memox.feature_bottom_sheet_entrypoint
    type: regex
    severity: error
    enabled: true
    message: Avoid raw `showModalBottomSheet(...)` in feature presentation code; route through a shared helper.
    scopes:
      - features
    patterns:
      - showModalBottomSheet\s*\(
    tags:
      - memox
      - design-system
      - architecture
  - id: memox.app_bar_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material app bars in feature code; prefer shared toolbar primitives.
    scopes:
      - features
    patterns:
      - \bAppBar\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.floating_action_button_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material floating action buttons in feature code; prefer shared FAB primitives.
    scopes:
      - features
    patterns:
      - \bFloatingActionButton(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.button_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material button widgets in feature code; prefer shared button primitives.
    scopes:
      - features
    patterns:
      - \bElevatedButton(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bFilledButton(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bOutlinedButton(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bTextButton(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.dialog_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material dialog widgets in feature code; prefer shared dialog primitives.
    scopes:
      - features
    patterns:
      - \bAlertDialog(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bSimpleDialog(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bAboutDialog(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bDialog(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.input_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material text input widgets in feature code; prefer shared text-field primitives.
    scopes:
      - features
    patterns:
      - \bTextField(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bTextFormField(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bSearchBar(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bSearchAnchor(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.chip_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material chip widgets in feature code; prefer shared chip primitives.
    scopes:
      - features
    patterns:
      - \bChip(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bChoiceChip(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bFilterChip(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bActionChip(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bInputChip(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.icon_button_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material icon buttons in feature code; prefer shared icon-button primitives.
    scopes:
      - features
    patterns:
      - \bIconButton(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.select_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material dropdown widgets in feature code; prefer shared select-field primitives.
    scopes:
      - features
    patterns:
      - \bDropdownButton(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bDropdownButtonFormField(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bDropdownMenu(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.progress_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material progress indicators in feature code; prefer shared loading/progress primitives.
    scopes:
      - features
    patterns:
      - \bCircularProgressIndicator(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bLinearProgressIndicator(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.divider_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material dividers in feature code; prefer shared divider primitives.
    scopes:
      - features
    patterns:
      - \bDivider(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bVerticalDivider(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.switch_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material switches in feature code; prefer shared toggle primitives.
    scopes:
      - features
    patterns:
      - \bSwitch(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
      - \bSwitchListTile(?:\.[A-Za-z_][A-Za-z0-9_]*)?\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.misc_raw_material_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Flutter Material higher-level controls in feature code, such as checkboxes, radios, sliders, menus,
      tiles, tabs, navigation widgets, steppers, and date/time pickers; prefer shared Mx primitives.
    scopes:
      - features
    patterns:
      - \bCheckbox\s*\(
      - \bCheckboxListTile\s*\(
      - \bRadio\s*\(
      - \bRadioListTile\s*\(
      - \bSlider\s*\(
      - \bRangeSlider\s*\(
      - \bSegmentedButton(?:<[^>]+>)?\s*\(
      - \bPopupMenuButton(?:<[^>]+>)?\s*\(
      - \bMenuAnchor\s*\(
      - \bMenuBar\s*\(
      - \bSubmenuButton\s*\(
      - \bListTile\s*\(
      - \bExpansionTile\s*\(
      - \bNavigationBar\s*\(
      - \bBottomNavigationBar\s*\(
      - \bNavigationRail\s*\(
      - \bNavigationDrawer\s*\(
      - \bTabBar\s*\(
      - \bTabBarView\s*\(
      - \bTabPageSelector\s*\(
      - \bStepper\s*\(
      - \bshowDatePicker\s*\(
      - \bshowDateRangePicker\s*\(
      - \bshowTimePicker\s*\(
      - \bDatePickerDialog\s*\(
      - \bTimePickerDialog\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.snackbar_usage
    type: regex
    severity: error
    enabled: true
    message: Avoid raw Material snack bars in feature code; prefer shared snackbar helpers.
    scopes:
      - features
    patterns:
      - \bSnackBar\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.popup_menu_button_child_forbidden
    type: regex
    severity: error
    enabled: true
    message: 'Do not use `PopupMenuButton(child: ...)` on UI surfaces because its internal overlay may not match the child''s
      rounded shape.'
    scopes:
      - ui
    patterns:
      - '(?s)\bPopupMenuButton(?:<[^>]+>)?\s*\(.*?\bchild\s*:'
    mode: file
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.snackbar_messenger_usage
    type: regex
    severity: error
    enabled: true
    message: Feature UI should not call `ScaffoldMessenger.of(...)` directly; route feedback through shared snackbar helpers.
    scopes:
      - feature_ui
    patterns:
      - \bScaffoldMessenger\.of\s*\(
    tags:
      - memox
      - design-system
      - architecture
  - id: memox.dialog_entrypoint_usage
    type: regex
    severity: error
    enabled: true
    message: Feature UI should not call `showDialog(...)` directly; route dialog flows through shared dialog helpers.
    scopes:
      - feature_ui
    patterns:
      - \bshowDialog\s*\(
    tags:
      - memox
      - design-system
      - architecture
  - id: memox.text_style
    type: regex
    severity: error
    enabled: true
    message: Avoid raw `TextStyle(...)` in feature UI files; prefer theme text styles and shared typography.
    scopes:
      - feature_ui
    patterns:
      - \bTextStyle\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.ui_direct_color_typography_tokens
    type: regex
    severity: error
    enabled: true
    message: UI code should access colors and typography through theme/context extensions, not directly from raw theme source
      files such as `app_colors.dart` or `app_typography.dart`.
    scopes:
      - ui
    patterns:
      - import\s+'package:memox/core/theme/tokens/app_colors\.dart';
      - import\s+'package:memox/core/theme/tokens/app_typography\.dart';
      - import\s+'(?:\.\./)+core/theme/tokens/app_colors\.dart';
      - import\s+'(?:\.\./)+core/theme/tokens/app_typography\.dart';
      - \bAppColors\.
      - \bAppTypography\.
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.app_no_direct_material_colors
    type: regex
    severity: error
    enabled: true
    message: App source must not use `Colors.*` directly. Read colors from the active `ColorScheme`, a custom theme extension,
      or a shared semantic accessor instead.
    scopes:
      - non_legacy_app_source
    patterns:
      - \bColors\.
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.presentation_deprecated_with_opacity
    type: regex
    severity: error
    enabled: true
    message: Feature presentation code must not call `.withOpacity(...)`; route opacity through theme-driven semantic color
      APIs or centralized opacity tokens instead.
    scopes:
      - feature_ui
    patterns:
      - \.withOpacity\s*\(
    tags:
      - memox
      - design-system
      - design_system
  - id: memox.feature_theme_token_imports
    type: regex
    severity: error
    enabled: true
    message: Feature-layer source must not import raw theme source files such as `app_spacing.dart` or `app_radius.dart`;
      consume UI values through theme/context accessors or shared widgets instead. (`app_colors.dart` / `app_typography.dart`
      imports are covered by `memox.ui_direct_color_typography_tokens` on the wider `ui` scope.)
    scopes:
      - features
    patterns:
      - import\s+'package:memox/core/theme/tokens/app_spacing\.dart'
      - import\s+'package:memox/core/theme/tokens/app_radius\.dart'
      - import\s+'package:memox/core/theme/tokens/app_elevation\.dart'
      - import\s+'package:memox/core/theme/tokens/app_motion\.dart'
      - import\s+'package:memox/core/theme/tokens/app_opacity\.dart'
      - import\s+'package:memox/core/theme/responsive/app_breakpoints\.dart'
      - import\s+'package:memox/core/theme/tokens/app_icon_sizes\.dart'
    tags:
      - memox
      - design-system
      - architecture
      - design_system
  - id: memox.features_no_direct_text_theme
    type: regex
    severity: error
    enabled: true
    message: 'Feature code must not choose Material text-theme roles directly. Route semantic typography through `MxText(role:
      ...)` so the same UI intent resolves to the same scale across screens.'
    scopes:
      - features
    patterns:
      - Theme\.of\(context\)\.textTheme\.
      - \.textTheme\.(?:display|headline|title|body|label)
    tags:
      - memox
      - design-system
      - architecture
      - design_system
  - id: memox.theme_file_no_riverpod
    type: regex
    severity: error
    enabled: true
    message: '`lib/core/theme/app_theme.dart` should contain theme definitions only, not Riverpod providers or notifier classes.'
    scopes:
      - theme_file
    patterns:
      - '@riverpod'
      - '@Riverpod'
      - class\s+\w+\s+extends\s+_\$\w+
    tags:
      - memox
      - design-system
      - architecture
  - id: memox.no_theme_export_wrappers
    type: regex
    severity: error
    enabled: true
    message: '`lib/core/theme/**` should not use export-wrapper files; import the real theme source file directly.'
    scopes:
      - theme_sources
    patterns:
      - ^export\s+
    tags:
      - memox
      - design-system
      - architecture
  - id: memox.app_bar_header_requires_toolbar_icon_buttons
    type: regex
    severity: error
    enabled: true
    message: App bar and feature header icon actions must use `MxIconButton.toolbar(...)` so normal Back/More actions stay
      visually quiet.
    scopes:
      - app_bar_header_files
    patterns:
      - \bMxIconButton\s*\(
    tags:
      - memox
      - design-system
      - architecture
      - design_system
  - id: memox.app_bar_header_no_framed_buttons
    type: regex
    severity: error
    enabled: true
    message: App bar and feature header actions should not use framed button surfaces unless the state is explicitly selected,
      active, or destructive.
    scopes:
      - app_bar_header_framed_button_files
    patterns:
      - \bMxPrimaryButton\s*\(
      - \bMxSecondaryButton\s*\(
      - \bMxIconButton\.(?:filled|filledTonal|outlined)\s*\(
    tags:
      - memox
      - design-system
      - architecture
      - design_system
  - id: memox.no_raw_ink_surface
    type: regex
    severity: error
    enabled: true
    message: Interactive UI surfaces must route hover, focus, and pressed overlays through a shared shaped tap primitive instead
      of hand-rolled `InkWell`, `InkResponse`, or tap-only `GestureDetector` usage.
    scopes:
      - ui
    exclude:
      - lib/presentation/shared/widgets/mx_tappable.dart
    patterns:
      - \bInkWell\s*\(
      - \bInkResponse\s*\(
      - '(?s)GestureDetector\s*\((?:(?!\)).)*?\bonTap\s*:'
    mode: file
    tags:
      - memox
      - design-system
      - architecture
      - design_system
  - id: memox.no_raw_card
    type: regex
    severity: error
    enabled: true
    message: MemoX must not use Card directly. Use MxCard or a more specific shared surface.
    scopes:
      - flutter_source
    exclude:
      - lib/presentation/shared/**
    patterns:
      - \bCard\s*\(
    tags:
      - memox
      - ui
      - design-system
    fix:
      hint: Replace raw Card usage with MxCard or a more specific shared surface.
