version: 1

metadata:
  id: flutter-rules
  name: Flutter Rules
  description: Rules for Flutter UI and architecture.
  owner: code-verification-guard

rules:
  - id: flutter.no_hardcoded_color
    type: regex
    severity: error
    enabled: true
    message: Do not use hardcoded Color. Use theme colorScheme or AppColors.
    scopes:
      - flutter_app_source
    patterns:
      - "Color\\(0x[0-9A-Fa-f]{8}\\)"
      - "\\bColors\\.[a-zA-Z0-9_]+"
    tags:
      - flutter
      - ui
      - design-system
    fix:
      hint: Use context.colorScheme or AppColors instead of raw Color/Colors.
      example_bad: "Color(0xFF123456)"
      example_good: context.colorScheme.primary

  - id: flutter.no_hardcoded_duration
    type: regex
    severity: warning
    enabled: true
    message: Do not use hardcoded Duration values. Use AppDurations.
    scopes:
      - flutter_app_source
    patterns:
      - "\\bDuration\\s*\\("
    tags:
      - flutter
      - ui
      - design-system
    fix:
      hint: Use a named duration token such as AppDurations.

  - id: flutter.no_hardcoded_radius
    type: regex
    severity: warning
    enabled: true
    message: Do not use hardcoded BorderRadius or Radius values. Use AppRadius.
    scopes:
      - flutter_app_source
    patterns:
      - "\\bBorderRadius\\."
      - "\\bRadius\\.circular\\("
    tags:
      - flutter
      - ui
      - design-system
    fix:
      hint: Use a named radius token such as AppRadius.

  - id: flutter.max_build_lines
    type: max_build_lines
    severity: warning
    enabled: true
    message: build() is too long. Split it into smaller widgets.
    scopes:
      - flutter_source
    max_lines: 80
    tags:
      - flutter
      - maintainability
    fix:
      hint: Extract smaller widgets or private build helpers.
