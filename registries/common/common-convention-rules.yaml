version: 1

metadata:
  id: common-convention-rules
  name: Common Convention Rules
  description: Generic coding convention rules for all projects.

rules:
  - id: common.no_placeholder_implementation
    type: regex
    severity: error
    enabled: true
    message: Placeholder implementations must not be committed.
    scopes:
      - source_files
    patterns:
      - "\\b(pass|TODO|FIXME)\\b\\s*(#|//)?\\s*(implement|implementation|later|temporary|temp|stub|placeholder|not implemented)"
      - "\\bthrow\\s+new\\s+UnsupportedOperationException\\s*\\("
      - "\\bthrow\\s+UnimplementedError\\s*\\("
      - "\\bNotImplementedError\\s*\\("
    tags:
      - common
      - convention
      - correctness
    fix:
      hint: Replace the placeholder with the real implementation or remove the unused code.

  - id: common.no_commented_out_code
    type: regex
    severity: error
    enabled: true
    message: Commented-out code should not be committed.
    scopes:
      - source_files
    patterns:
      - "^\\s*(#|//)\\s*(if|for|while|return|class|def|function|const|let|var|final|public|private|protected)\\b"
    tags:
      - common
      - convention
      - cleanup
    fix:
      hint: Delete commented-out code or explain the decision in a normal comment.
