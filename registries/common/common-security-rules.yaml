version: 1

metadata:
  id: common-security-rules
  name: Common Security Rules
  description: Generic security rules for all projects.

rules:
  - id: security.no_private_key
    type: regex
    severity: error
    enabled: true
    message: Private keys must not be committed to source code.
    scopes:
      - all_text_files
    exclude:
      - "**/registries/**"
      - "**/docs/**"
      - "**/templates/**"
      - "**/.venv/**"
      - "**/node_modules/**"
      - "**/build/**"
      - "**/dist/**"
    patterns:
      - "-----BEGIN PRIVATE KEY-----"
      - "-----BEGIN RSA PRIVATE KEY-----"
      - "-----BEGIN OPENSSH PRIVATE KEY-----"
      - "-----BEGIN EC PRIVATE KEY-----"
    tags:
      - security
      - secret
    fix:
      hint: Remove the private key and load it from a secure secret manager or environment variable.

  - id: security.no_hardcoded_secret_assignment
    type: regex
    severity: error
    enabled: true
    message: Do not hardcode secrets, passwords, tokens, or API keys.
    scopes:
      - source_and_config_files
    exclude:
      - "**/.env.example"
      - "**/example/**"
      - "**/examples/**"
      - "**/registries/**"
      - "**/docs/**"
      - "**/templates/**"
      - "**/.venv/**"
      - "**/node_modules/**"
      - "**/build/**"
      - "**/dist/**"
    patterns:
      - "(?i)\\b(api[_-]?key|secret|password|passwd|pwd|token|access[_-]?token|refresh[_-]?token)\\b\\s*[:=]\\s*['\"][^'\"]{8,}['\"]"
    tags:
      - security
      - secret
    fix:
      hint: Move the value to environment variables or secure configuration.

  - id: security.no_aws_access_key
    type: regex
    severity: error
    enabled: true
    message: AWS access keys must not be committed.
    scopes:
      - all_text_files
    exclude:
      - "**/registries/**"
      - "**/docs/**"
      - "**/templates/**"
      - "**/.venv/**"
      - "**/node_modules/**"
    patterns:
      - "AKIA[0-9A-Z]{16}"
      - "ASIA[0-9A-Z]{16}"
    tags:
      - security
      - aws
      - secret
    fix:
      hint: Revoke the leaked key and use IAM roles or environment-based credentials.

  - id: security.no_generic_bearer_token
    type: regex
    severity: warning
    enabled: true
    message: Bearer tokens should not appear in source code.
    scopes:
      - source_and_config_files
    exclude:
      - "**/registries/**"
      - "**/docs/**"
      - "**/templates/**"
      - "**/.venv/**"
      - "**/node_modules/**"
    patterns:
      - "Bearer\\s+[A-Za-z0-9._\\-]{20,}"
    tags:
      - security
      - token
    fix:
      hint: Remove the token and load it securely at runtime.
