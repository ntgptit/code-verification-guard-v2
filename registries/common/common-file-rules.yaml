version: 1

metadata:
  id: common-file-rules
  name: Common File Rules
  description: Generic file hygiene rules for all projects.

rules:
  - id: common.no_large_source_file
    type: max_lines
    severity: warning
    enabled: true
    message: Source file is too large.
    scopes:
      - source_files
    max_lines: 400
    tags:
      - common
      - maintainability
    fix:
      hint: Split this file into smaller units.

  - id: common.no_committed_environment_file
    type: regex
    severity: warning
    enabled: true
    message: Environment files should usually not be committed unless they are examples.
    include:
      - ".env"
      - ".env.*"
      - "**/.env"
      - "**/.env.*"
    exclude:
      - ".env.example"
      - ".env.sample"
      - ".env.template"
      - "**/.env.example"
      - "**/.env.sample"
      - "**/.env.template"
    patterns:
      - ".+"
    tags:
      - common
      - security
      - environment
    fix:
      hint: Keep only .env.example/.env.sample in source control.

  - id: common.no_os_junk_file
    type: file_name
    severity: warning
    enabled: true
    message: OS junk files should not be committed.
    scopes:
      - project_files
    pattern: "^(?!\\.DS_Store$)(?!Thumbs\\.db$)(?!desktop\\.ini$).*$"
    tags:
      - common
      - cleanup
    fix:
      hint: Delete OS-generated junk files and add them to .gitignore.
