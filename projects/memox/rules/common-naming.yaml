version: 1

metadata:
  id: common-naming-rules
  name: Common Naming Rules
  description: Generic naming rules for all projects.

rules:
  - id: common.no_space_in_file_name
    type: file_name
    severity: error
    enabled: true
    message: File names must not contain spaces.
    scopes:
      - project_files
    pattern: "^[^\\s]+$"
    tags:
      - common
      - naming
    fix:
      hint: Rename the file using kebab-case, snake_case, or the language-specific convention.

  - id: common.no_uppercase_extension
    type: file_name
    severity: warning
    enabled: true
    message: File extensions should be lowercase.
    scopes:
      - project_files
    pattern: "^.*\\.[a-z0-9]+$|^[^.]+$"
    tags:
      - common
      - naming
    fix:
      hint: Rename extensions such as .PNG, .JPG, .DART, .JAVA to lowercase.

  - id: common.no_temp_file_name
    type: file_name
    severity: warning
    enabled: true
    message: Temporary file names should not be committed.
    scopes:
      - project_files
    pattern: "^(?!.*(~|\\.tmp$|\\.bak$|\\.old$|\\.orig$|copy|Copy)).*$"
    tags:
      - common
      - cleanup
    fix:
      hint: Remove temporary/backup files or rename them properly.
