version: 1

metadata:
  id: typescript-scopes
  name: TypeScript Scopes

scopes:
  typescript_source:
    include:
      - "src/**/*.ts"
      - "src/**/*.tsx"
    exclude:
      - "**/*.d.ts"
      - "**/*.test.ts"
      - "**/*.test.tsx"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"

  react_source:
    include:
      - "src/**/*.tsx"
      - "src/**/*.jsx"
    exclude:
      - "**/*.test.tsx"
      - "**/*.test.jsx"
      - "**/node_modules/**"
      - "**/dist/**"
      - "**/build/**"
